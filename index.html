<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel Sanat v8.6 - Pro Grid</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --yellow: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 5px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* HAFTALIK TABLO */
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
        .weekly-table { width: 100%; border-collapse: collapse; min-width: 1200px; table-layout: fixed; }
        .weekly-table th { background: var(--dark); color: white; padding: 10px; font-size: 13px; border: 1px solid #444; }
        .weekly-table td { border: 1px solid #ddd; vertical-align: top; padding: 5px; background: #fdfdfd; min-height: 150px; }
        .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }

        /* ÖĞRENCİ LİSTESİ - 3'LÜ GRID */
        #lessonList { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 15px; 
            padding: 10px 0;
        }

        /* ÖĞRENCİ KARTLARI */
        .lesson-item { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            border-left: 8px solid var(--pink); 
            box-shadow: 0 3px 10px rgba(0,0,0,0.08); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            position: relative;
        }
        .status-absent { opacity: 0.5; background: #eee; border-left-color: #666 !important; }

        /* GİRİŞ MODAL DÜZELTME */
        #loginModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; text-align:center; width:300px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* DİĞER STİLLER */
        .mini-lesson { font-size: 9px; background: white; border: 1px solid #e0e0e0; border-radius: 4px; padding: 3px; margin-bottom: 2px; }
        .mini-active { background: #d1fae5 !important; border-color: var(--green) !important; }
        .mini-telafi { background: var(--yellow) !important; border-color: #d39e00 !important; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-pink { background: var(--pink); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-sm { flex: 1; padding: 8px; font-size: 11px; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        #adminPanel { display: none; }
        .is-admin #adminPanel { display: block; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: inline-block !important; }
    </style>
</head>
<body id="bodyTag">

<div id="loginModal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--dark)">Yönetici Girişi</h3>
        <p style="font-size:12px; color:#666">Lütfen erişim şifresini giriniz</p>
        <input type="password" id="passInput" placeholder="Şifre" style="text-align:center; margin-bottom:15px; width:100%; box-sizing:border-box;">
        <button class="btn-pink" onclick="checkPass()" style="width:100%">GİRİŞ YAP</button>
        <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer">İptal</button>
    </div>
</div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--dark); color:white; border-radius:12px; margin-bottom:10px;">
        <strong id="modeLabel">🔒 Hoca Modu</strong>
        <button onclick="openModal()" style="width:auto; padding:6px 15px; background:var(--pink); border:none; color:white; border-radius:8px; cursor:pointer">DEĞİŞTİR</button>
    </div>

    <div class="table-wrapper">
        <table class="weekly-table">
            <thead>
                <tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr>
            </thead>
            <tbody id="weeklyBody">
                <tr>
                    <td><div class="day-grid" id="day-1"></div></td>
                    <td><div class="day-grid" id="day-2"></div></td>
                    <td><div class="day-grid" id="day-3"></div></td>
                    <td><div class="day-grid" id="day-4"></div></td>
                    <td><div class="day-grid" id="day-5"></div></td>
                    <td><div class="day-grid" id="day-6"></div></td>
                    <td><div class="day-grid" id="day-0"></div></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="adminPanel" class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <div><strong>Hocalar</strong><input type="text" id="newTeacherName" placeholder="Ad Soyad"><button class="btn-pink" onclick="addItem('hocalar', 'newTeacherName')" style="padding:5px; margin-top:2px;">Ekle</button></div>
            <div><strong>Branşlar</strong><input type="text" id="newBranchName" placeholder="Branş Adı"><button class="btn-pink" onclick="addItem('branslar', 'newBranchName')" style="padding:5px; margin-top:2px;">Ekle</button></div>
        </div>
        <hr>
        <strong>Ders Ekle:</strong>
        <input type="text" id="studentName" placeholder="Öğrenci">
        <div style="display:flex; gap:5px;"><select id="lessonBranch"></select><select id="teacherSelect"></select></div>
        <div style="display:flex; gap:5px;"><input type="date" id="lessonDate"><input type="time" id="lessonTimeOnly"></div>
        <div style="display:flex; gap:5px;"><input type="number" id="lessonDuration" value="1"><select id="isOffInit"><option value="false">Normal</option><option value="true">Telafi</option></select></div>
        <button class="btn-pink" onclick="addLesson()" style="width:100%; margin-top:10px;">KAYDET</button>
    </div>

    <div class="card" style="display:flex; gap:10px;">
        <select id="viewFilter" onchange="loadLessons()" style="flex:1"></select>
        <input type="text" id="studentSearch" placeholder="İsim ara..." onkeyup="loadLessons()" style="flex:1">
    </div>

    <div id="lessonList"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w",
        authDomain: "karamel-sanat-merkezi.firebaseapp.com",
        projectId: "karamel-sanat-merkezi",
        storageBucket: "karamel-sanat-merkezi.firebasestorage.app",
        messagingSenderId: "669363030241",
        appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0"
    };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    function openModal() { if(document.getElementById('bodyTag').classList.contains('is-admin')) { document.getElementById('bodyTag').classList.remove('is-admin'); document.getElementById('modeLabel').innerText = "🔒 Hoca Modu"; } else { document.getElementById('loginModal').style.display='flex'; } }
    function checkPass() { if(document.getElementById('passInput').value === "1234") { document.getElementById('bodyTag').classList.add('is-admin'); document.getElementById('modeLabel').innerText = "🔓 Yönetici Modu"; document.getElementById('loginModal').style.display='none'; document.getElementById('passInput').value=""; loadLessons(); } else { alert("Hatalı!"); } }

    function syncLists() {
        db.collection("hocalar").orderBy("name").onSnapshot(snap => {
            const s1 = document.getElementById('teacherSelect'), s2 = document.getElementById('viewFilter');
            s1.innerHTML = '<option value="">Hoca Seç...</option>'; s2.innerHTML = '<option value="Hepsi">Tüm Program</option>';
            snap.forEach(doc => { s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; s2.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
        });
        db.collection("branslar").orderBy("name").onSnapshot(snap => {
            const b = document.getElementById('lessonBranch'); b.innerHTML = '<option value="">Branş Seç...</option>';
            snap.forEach(doc => { b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; });
        });
    }

    async function addItem(coll, id) { const v = document.getElementById(id).value; if(v) await db.collection(coll).add({name:v}); document.getElementById(id).value=""; }
    async function addLesson() {
        const s = document.getElementById('studentName').value, t = document.getElementById('teacherSelect').value, d = document.getElementById('lessonDate').value, tm = document.getElementById('lessonTimeOnly').value;
        if(!s || !t || !d || !tm) return alert("Eksik!");
        await db.collection("dersler").add({ student:s, teacher:t, time: `${d}T${tm}`, duration: document.getElementById('lessonDuration').value||1, branch: document.getElementById('lessonBranch').value, isPaid: 'Ödenmedi', isOff: document.getElementById('isOffInit').value==="true", status: 'Bekliyor', checkIn: null, checkOut: null });
        alert("Kaydedildi!");
    }

    function loadLessons() {
        const filter = document.getElementById('viewFilter').value;
        const search = document.getElementById('studentSearch').value.toLowerCase();
        let query = db.collection("dersler");
        if(filter !== "Hepsi") query = query.where("teacher", "==", filter);

        query.onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList');
            const grids = { 0: document.getElementById('day-0'), 1: document.getElementById('day-1'), 2: document.getElementById('day-2'), 3: document.getElementById('day-3'), 4: document.getElementById('day-4'), 5: document.getElementById('day-5'), 6: document.getElementById('day-6') };
            Object.values(grids).forEach(g => g.innerHTML = "");
            listDiv.innerHTML = "";
            let docs = [];
            snap.forEach(d => docs.push({id: d.id, ...d.data()}));
            docs.sort((a,b) => new Date(a.time) - new Date(b.time));

            docs.forEach(d => {
                const dt = new Date(d.time);
                const isTelafi = String(d.isOff) === "true";
                const isAbsent = d.status === 'Gelmedi';

                // Tablo Ekleme
                const day = dt.getDay();
                if(grids[day]) {
                    let sClass = d.checkIn ? 'mini-active' : (isTelafi ? 'mini-telafi' : '');
                    if(isAbsent) sClass = 'mini-absent';
                    grids[day].innerHTML += `<div class="mini-lesson ${sClass}"><b>${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</b> ${d.student}</div>`;
                }

                // Liste Filtreleme
                if(!d.student.toLowerCase().includes(search)) return;

                listDiv.innerHTML += `
                    <div class="lesson-item ${isAbsent?'status-absent':''}">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <strong style="font-size:16px;">${d.student}</strong><br>
                                <small style="color:#666">${d.branch} | ${d.teacher}</small>
                            </div>
                            <span class="badge" style="background:#fdf2f8; color:var(--pink); padding:5px 10px; border-radius:8px; font-size:12px;">${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</span>
                        </div>
                        <div style="margin:10px 0; font-size:12px; font-weight:bold; color:var(--pink)">
                            ${d.checkIn ? '▶️ Giriş: '+d.checkIn : ''} ${d.checkOut ? ' | ⏹️ Çıkış: '+d.checkOut : ''}
                        </div>
                        <div class="btn-group">
                            <button class="btn-sm" style="background:var(--green)" onclick="toggleT('${d.id}','checkIn','${d.checkIn||''}')">GİRİŞ</button>
                            <button class="btn-sm" style="background:var(--blue)" onclick="toggleT('${d.id}','checkOut','${d.checkOut||''}')">ÇIKIŞ</button>
                            <button class="btn-sm" style="background:#888" onclick="db.collection('dersler').doc('${d.id}').update({status:'${isAbsent?'Bekliyor':'Gelmedi'}'})">G/B</button>
                            <button class="btn-sm admin-only" style="background:var(--red)" onclick="if(confirm('Sil?')) db.collection('dersler').doc('${d.id}').delete()">SİL</button>
                        </div>
                    </div>`;
            });
        });
    }

    async function toggleT(id, f, v) { let n = (v === "") ? new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : ""; await db.collection("dersler").doc(id).update({[f]:n}); }
    syncLists(); loadLessons();
</script>
</body>
</html>
