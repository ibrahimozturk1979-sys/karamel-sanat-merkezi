<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.14 - Final Patch</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; }

        /* YAN PANELLER */
        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100%; background: white; z-index: 30000; box-shadow: -5px 0 25px rgba(0,0,0,0.1); padding: 20px; border-left: 5px solid var(--pink); box-sizing: border-box; overflow-y: auto; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }

        /* AUTOCOMPLETE */
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-items { position: absolute; border: 1px solid #ddd; z-index: 99; top: 100%; left: 0; right: 0; background: white; max-height: 200px; overflow-y: auto; border-radius: 0 0 10px 10px; }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-items div:hover { background: #f1f1f1; }

        /* ADMIN BAR & REG GRID */
        .admin-bar { display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .is-admin .admin-bar, .is-admin #adminArea { display: grid; }
        #adminArea { display: none; margin-bottom: 15px; }
        .bar-btn { background: white; border: 1px solid #ddd; padding: 10px 2px; border-radius: 12px; font-size: 10px; cursor: pointer; text-align: center; font-weight: bold; }
        
        .reg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        @media (max-width: 900px) { .reg-grid { grid-template-columns: 1fr; } }

        /* TABLO VE KARTLAR */
        #tableModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; overflow: auto; }
        .weekly-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .weekly-table th { background: var(--dark); color: white; padding: 10px; }
        .weekly-table td { border: 1px solid #ddd; padding: 5px; vertical-align: top; background: #fff; min-height: 80px; }
        .mini-lesson { font-size: 10px; padding: 5px; border-radius: 5px; margin-bottom: 3px; border: 1px solid #eee; }
        .mini-active { background: #d1fae5 !important; border-color: var(--green) !important; border-width: 2px; }
        .mini-absent { opacity: 0.6; background: #fee2e2 !important; }

        #lessonList { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .pay-badge-fixed { position: absolute; top: 12px; right: 12px; padding: 5px 10px; border-radius: 8px; font-size: 10px; color: white; font-weight: bold; cursor: pointer; }

        .btn-pink { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        #payPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 40000; justify-content: center; align-items: center; }
    </style>
</head>
<body id="bodyTag">

<div id="payPopup">
    <div style="background:white; padding:25px; border-radius:20px; width:280px;">
        <h3 id="popStudent" style="margin-top:0">Ödeme Güncelle</h3>
        <select id="popStatus" onchange="tglPrice()"><option value="Ödenmedi">Ödenmedi</option><option value="Ödendi">Ödendi</option><option value="Ön Ödeme">Ön Ödeme</option></select>
        <input type="number" id="popPrice" placeholder="₺">
        <button class="btn-pink" onclick="savePay()" style="margin-top:15px;">GÜNCELLE</button>
        <button onclick="document.getElementById('payPopup').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:gray;">Vazgeç</button>
    </div>
</div>

<div id="pStudents" class="side-panel">
    <div class="panel-header"><strong>👥 Öğrenci Veritabanı</strong><button onclick="cP('pStudents')">✕</button></div>
    <div style="margin-bottom:15px; background:#f8f9fa; padding:15px; border-radius:15px;">
        <input type="text" id="dbSName" placeholder="Öğrenci Ad Soyad">
        <input type="number" id="dbSPrice" placeholder="Ders Ücreti ₺">
        <button class="btn-pink" onclick="addDBStudent()" style="margin-top:10px;">YENİ ÖĞRENCİ EKLE</button>
    </div>
    <div id="studentDBList"></div>
</div>

<div id="pPerf" class="side-panel"><div class="panel-header"><strong>💰 Hakediş Paneli</strong><button onclick="cP('pPerf')">✕</button></div><div id="payrollArea"></div></div>
<div id="pAbs" class="side-panel"><div class="panel-header"><strong>🚫 Devamsızlık Takibi</strong><button onclick="cP('pAbs')">✕</button></div><div id="absentLog"></div></div>
<div id="pTeachers" class="side-panel"><div class="panel-header"><strong>👨‍🏫 Hoca Listesi</strong><button onclick="cP('pTeachers')">✕</button></div>
    <input type="text" id="nTName" placeholder="Hoca Adı"><input type="number" id="nTRate" placeholder="Ders Başı Hakediş ₺">
    <button class="btn-pink" onclick="addTeacher()" style="margin-top:5px;">HOCA EKLE</button><hr><div id="tList"></div></div>
<div id="pBranches" class="side-panel"><div class="panel-header"><strong>🎨 Branş Listesi</strong><button onclick="cP('pBranches')">✕</button></div>
    <input type="text" id="nBName" placeholder="Branş Adı">
    <button class="btn-pink" onclick="addBranch()" style="margin-top:5px; background:var(--dark);">BRANŞ EKLE</button><hr><div id="bList"></div></div>

<div id="tableModal">
    <button onclick="document.getElementById('tableModal').style.display='none'" style="position:fixed; top:20px; right:20px; z-index:10001; background:var(--red); color:white; border:none; border-radius:50%; width:45px; height:45px; font-weight:bold; cursor:pointer;">✕</button>
    <div style="padding:70px 10px 20px 10px; overflow-x:auto;"><table class="weekly-table"><thead><tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr></thead><tbody id="weeklyBody"><tr><td><div id="day-1"></div></td><td><div id="day-2"></div></td><td><div id="day-3"></div></td><td><div id="day-4"></div></td><td><div id="day-5"></div></td><td><div id="day-6"></div></td><td><div id="day-0"></div></td></tr></tbody></table></div>
</div>

<div class="container">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button onclick="document.getElementById('tableModal').style.display='block'" style="flex:4; background:var(--dark); color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;">📅 HAFTALIK PROGRAMI AÇ</button>
        <button onclick="openMod()" style="flex:1; background:var(--pink); color:white; border:none; border-radius:15px; font-weight:bold;">MOD</button>
    </div>

    <div class="admin-bar">
        <div class="bar-btn" onclick="oP('pPerf')">💰<br>Hakediş</div>
        <div class="bar-btn" onclick="oP('pAbs')">🚫<br>Devamsızlık</div>
        <div class="bar-btn" onclick="oP('pStudents')">👥<br>Öğrenciler</div>
        <div class="bar-btn" onclick="oP('pTeachers')">👨‍🏫<br>Hocalar</div>
        <div class="bar-btn" onclick="oP('pBranches')">🎨<br>Branşlar</div>
    </div>

    <div id="adminArea">
        <div class="card" style="background:white; border:1px solid #ddd; padding:15px; border-radius:20px; margin-bottom:15px;">
            <div class="reg-grid">
                <div class="autocomplete-container">
                    <label><small>Öğrenci</small></label>
                    <input type="text" id="sName" placeholder="Öğrenci ismi..." oninput="showSuggest(this)">
                    <div id="sSuggest" class="autocomplete-items"></div>
                    <input type="text" id="sPhoto" placeholder="Fotoğraf URL (Opsiyonel)" style="margin-top:5px;">
                </div>
                <div><label><small>Ders Tanımı</small></label><select id="lBranch"></select><select id="tSelect"></select><select id="lType"><option value="Normal">Normal Ders</option><option value="Telafi">Telafi Dersi</option></select></div>
                <div><label><small>Tarih & Saat</small></label><input type="date" id="lDate"><input type="time" id="lTime"></div>
                <div><label><small>Ödeme & Ücret</small></label><select id="pStatus"><option value="Ödenmedi">Ödenmedi</option><option value="Ödendi">Ödendi</option><option value="Ön Ödeme">Ön Ödeme</option></select><input type="number" id="lPrice" placeholder="Ücret ₺"><button class="btn-pink" onclick="saveLesson()" style="margin-top:5px;">DERSI KAYDET</button></div>
            </div>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <select id="vFilter" onchange="render()" style="flex:1; margin-top:0"></select>
        <input type="text" id="sSearch" placeholder="Listede ara..." onkeyup="render()" style="flex:2; margin-top:0">
    </div>

    <div id="lessonList"></div>
</div>

<script>
    // FIREBASE BAGLANTISI
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let selId = null, tMap = {}, sDB = [];

    // PANEL FONKSIYONLARI
    function oP(id) { document.querySelectorAll('.side-panel').forEach(p => p.style.display='none'); document.getElementById(id).style.display='block'; }
    function cP(id) { document.getElementById(id).style.display='none'; }
    function openMod() { let p = prompt("Yönetici Şifresi:"); if(p==="1234") { document.getElementById('bodyTag').classList.add('is-admin'); render(); } }

    // VERITABANI ISLEMLERI
    async function addDBStudent() {
        const n = document.getElementById('dbSName').value, p = document.getElementById('dbSPrice').value;
        if(n) await db.collection("ogrenciler").add({ name: n, price: parseFloat(p)||0 });
        document.getElementById('dbSName').value = ""; document.getElementById('dbSPrice').value = "";
    }

    async function addTeacher() { const n = document.getElementById('nTName').value, r = document.getElementById('nTRate').value; if(n) await db.collection("hocalar").add({name:n, rate: parseFloat(r)||0}); }
    async function addBranch() { const n = document.getElementById('nBName').value; if(n) await db.collection("branslar").add({name:n}); }

    // AUTOCOMPLETE (AKILLI LISTE)
    function showSuggest(el) {
        const val = el.value.toLowerCase(), box = document.getElementById('sSuggest');
        box.innerHTML = ""; if(!val) return;
        sDB.filter(s => s.name.toLowerCase().includes(val)).forEach(s => {
            const div = document.createElement("div"); div.innerText = s.name;
            div.onclick = () => { el.value = s.name; document.getElementById('lPrice').value = s.price; box.innerHTML = ""; };
            box.appendChild(div);
        });
    }

    // SENKRONIZASYON (FULL SYNC)
    function sync() {
        db.collection("hocalar").orderBy("name").onSnapshot(snap => {
            const s1 = document.getElementById('tSelect'), s2 = document.getElementById('vFilter'), list = document.getElementById('tList');
            s1.innerHTML = '<option value="">Hoca Seç...</option>'; s2.innerHTML = '<option value="Hepsi">Tüm Hocalar</option>'; list.innerHTML = "";
            snap.forEach(doc => { 
                tMap[doc.data().name] = doc.data().rate || 0;
                s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; 
                s2.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;"><span>${doc.data().name} (${doc.data().rate}₺)</span><span onclick="del('hocalar','${doc.id}')" style="color:red; cursor:pointer;">Sil</span></div>`;
            });
        });
        db.collection("branslar").orderBy("name").onSnapshot(snap => {
            const b = document.getElementById('lBranch'), list = document.getElementById('bList');
            b.innerHTML = '<option value="">Branş Seç...</option>'; list.innerHTML = "";
            snap.forEach(doc => { 
                b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;"><span>${doc.data().name}</span><span onclick="del('branslar','${doc.id}')" style="color:red; cursor:pointer;">Sil</span></div>`;
            });
        });
        db.collection("ogrenciler").orderBy("name").onSnapshot(snap => {
            sDB = []; const list = document.getElementById('studentDBList'); list.innerHTML = "";
            snap.forEach(doc => {
                sDB.push({id: doc.id, ...doc.data()});
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span><b>${doc.data().name}</b><br><small>${doc.data().price}₺</small></span><span onclick="del('ogrenciler','${doc.id}')" style="color:red; cursor:pointer; font-weight:bold;">Sil</span></div>`;
            });
        });
    }

    // ODEME GÜNCELLEME
    function openPay(id, n, s, p) { if(!document.getElementById('bodyTag').classList.contains('is-admin')) return; selId=id; document.getElementById('popStudent').innerText=n; document.getElementById('popStatus').value=s; document.getElementById('popPrice').value=p; document.getElementById('payPopup').style.display='flex'; tglPrice(); }
    function tglPrice() { document.getElementById('popPrice').disabled = (document.getElementById('popStatus').value !== "Ön Ödeme"); }
    async function savePay() { await db.collection("dersler").doc(selId).update({ isPaid: document.getElementById('popStatus').value, price: parseFloat(document.getElementById('popPrice').value)||0 }); document.getElementById('payPopup').style.display='none'; }

    // DERS KAYDETME
    async function saveLesson() {
        const s = document.getElementById('sName').value, t = document.getElementById('tSelect').value, d = document.getElementById('lDate').value, tm = document.getElementById('lTime').value;
        if(!s || !t || !d || !tm) return alert("Hata: Öğrenci, Hoca, Tarih ve Saat alanları zorunludur!");
        await db.collection("dersler").add({ student:s, teacher:t, time:`${d}T${tm}`, branch:document.getElementById('lBranch').value, type:document.getElementById('lType').value, photo:document.getElementById('sPhoto').value, price:parseFloat(document.getElementById('lPrice').value)||0, isPaid:document.getElementById('pStatus').value, status:'Bekliyor', checkIn:null, checkOut:null });
        alert("Ders başarıyla kaydedildi.");
    }

    // ANA RENDER (LISTELEME VE TABLO)
    function render() {
        const filter = document.getElementById('vFilter').value, search = document.getElementById('sSearch').value.toLowerCase(), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            const grids = { 0: document.getElementById('day-0'), 1: document.getElementById('day-1'), 2: document.getElementById('day-2'), 3: document.getElementById('day-3'), 4: document.getElementById('day-4'), 5: document.getElementById('day-5'), 6: document.getElementById('day-6') };
            Object.values(grids).forEach(g => g.innerHTML = "");
            let hakedis = {}, absents = "";

            snap.forEach(doc => {
                const data = doc.data(); const dt = new Date(data.time);
                const isAbs = data.status === 'Gelmedi', isDone = data.checkIn !== null && data.checkIn !== "";
                
                // TABLOYA EKLE
                const day = dt.getDay();
                if(grids[day]) {
                    grids[day].innerHTML += `<div class="mini-lesson ${isDone?'mini-active':''} ${isAbs?'mini-absent':''}">
                        ${isDone?'✅':''} ${isAbs?'🚫':''} <b>${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</b> ${data.student}</div>`;
                }

                // HAKEDIS & DEVAMSIZLIK LOG
                if(isAbs) absents += `<div style="padding:10px; border-bottom:1px solid #eee; color:red;">📍 ${data.student} - ${dt.toLocaleDateString('tr-TR')}</div>`;
                else hakedis[data.teacher] = (hakedis[data.teacher] || 0) + 1;

                if(filter !== "Hepsi" && data.teacher !== filter) return;
                if(!data.student.toLowerCase().includes(search)) return;

                const stColor = data.isPaid === 'Ödendi' ? 'var(--green)' : (data.isPaid === 'Ön Ödeme' ? 'var(--blue)' : 'var(--red)');
                listDiv.innerHTML += `
                <div class="lesson-item" style="opacity:${isAbs?0.5:1}">
                    ${isAdmin ? `<div class="pay-badge-fixed" style="background:${stColor}" onclick="openPay('${doc.id}','${data.student}','${data.isPaid}','${data.price}')">${data.isPaid}</div>` : ''}
                    <div style="display:flex; align-items:center;">
                        <img onclick="openPay('${doc.id}','${data.student}','${data.isPaid}','${data.price}')" src="${data.photo||'https://cdn-icons-png.flaticon.com/512/194/194931.png'}" style="width:50px;height:50px;border-radius:50%;margin-right:12px;cursor:pointer;border:3px solid ${stColor}; object-fit:cover;">
                        <div>
                            <strong onclick="openPay('${doc.id}','${data.student}','${data.isPaid}','${data.price}')" style="cursor:pointer">${data.student}</strong><br>
                            <small>${data.teacher} | ${data.branch} (${data.type})</small>
                        </div>
                    </div>
                    <div style="margin-top:10px; font-size:12px;">⏰ ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')} - ${dt.toLocaleDateString('tr-TR')} ${isAdmin ? `<span style="float:right; font-weight:bold;">${data.price}₺</span>`:''}</div>
                    <div style="display:flex; gap:5px; margin-top:12px;">
                        <button onclick="tTime('${doc.id}','checkIn','${data.checkIn||''}')" style="flex:1; background:var(--green); color:white; border:none; border-radius:8px; padding:10px; font-weight:bold;">${data.checkIn?data.checkIn:'GİRİŞ'}</button>
                        <button onclick="db.collection('dersler').doc('${doc.id}').update({status:'${isAbs?'Bekliyor':'Gelmedi'}'})" style="flex:1; background:#666; color:white; border:none; border-radius:8px; font-weight:bold;">${isAbs?'GELDİ':'GELMEDİ'}</button>
                        ${isAdmin ? `<button onclick="del('dersler','${doc.id}')" style="flex:0.4; background:var(--red); color:white; border:none; border-radius:8px;">SİL</button>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('absentLog').innerHTML = absents || "Kayıt yok.";
            let pLog = ""; for(let t in hakedis) pLog += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span><b>${t}</b></span><span>${hakedis[t]} Ders (${hakedis[t]*(tMap[t]||0)}₺)</span></div>`;
            document.getElementById('payrollArea').innerHTML = pLog || "Veri yok.";
        });
    }

    async function del(c, id) { if(confirm('Bu kaydı kalıcı olarak silmek istediğine emin misin?')) await db.collection(c).doc(id).delete(); }
    async function tTime(id, f, v) { let n = v==="" ? new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : ""; await db.collection("dersler").doc(id).update({[f]:n, status: n===""?'Bekliyor':'Geldi'}); }
    
    sync(); render();
</script>
</body>
</html>
