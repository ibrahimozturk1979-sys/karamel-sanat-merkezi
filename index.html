<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.60 - Control & Alert</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --orange: #fd7e14; --yellow: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; margin: 0; padding: 10px; }
        
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }

        /* TABLO İKONLARI */
        .status-icon { font-size: 14px; margin-right: 3px; }
        .conflict-alert { color: var(--red); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* KART TASARIMI */
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .is-telafi { border-left-color: var(--orange); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #eee; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; color: #666; font-weight: bold; }
        
        /* ÖDEME ETİKETLERİ */
        .pay-badge { font-size: 10px; padding: 3px 6px; border-radius: 5px; cursor: pointer; font-weight: bold; position: absolute; top: 12px; right: 45px; }
        .bg-paid { background: #d1fae5; color: #065f46; }
        .bg-unpaid { background: #fee2e2; color: #991b1b; }
        .bg-pre { background: #dbeafe; color: #1e40af; }

        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100%; background: white; z-index: 30000; padding: 20px; border-left: 5px solid var(--pink); box-sizing: border-box; overflow-y: auto; }
        #panelOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 25000; }
        
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: var(--dark); color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 8px; vertical-align: top; background: white; }
        .mini-lesson { font-size: 11px; margin-bottom: 5px; padding: 4px; border-radius: 4px; border-left: 3px solid var(--pink); }
    </style>
</head>
<body id="bodyTag">

<div id="panelOverlay" onclick="closeAllPanels()"></div>

<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:50000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:20px; text-align:center;">
        <h3>Yönetici Girişi</h3>
        <input type="password" id="passInput" placeholder="Şifre" style="padding:10px; text-align:center; width:100%; border-radius:10px; border:1px solid #ddd;">
        <button onclick="checkPass()" style="margin-top:15px; width:100%; padding:10px; background:var(--pink); color:white; border:none; border-radius:10px; font-weight:bold;">GİRİŞ</button>
    </div>
</div>

<div id="pStudents" class="side-panel">
    <div style="display:flex; justify-content:space-between;"><strong>👥 Öğrenci Yönetimi</strong><button onclick="closeAllPanels()">✕</button></div>
    <div class="admin-only" style="margin-top:15px; background:#f9f9f9; padding:15px; border-radius:15px;">
        <input type="text" id="dbSName" placeholder="Ad Soyad">
        <input type="number" id="dbSPrice" placeholder="Ders Ücreti ₺" style="margin-top:8px; width:100%; padding:8px;">
        <select id="dbSPayStatus" style="margin-top:8px; width:100%; padding:8px;">
            <option value="Ödenmedi">Ödenmedi</option>
            <option value="Ödendi">Ödendi</option>
            <option value="Ön Ödeme">Ön Ödeme</option>
        </select>
        <button onclick="addDBStudent()" style="margin-top:10px; width:100%; background:var(--green); color:white; border:none; padding:10px; border-radius:8px;">EKLE</button>
    </div>
    <hr><div id="studentDBList"></div>
</div>

<div id="pTeachers" class="side-panel">
    <div style="display:flex; justify-content:space-between;"><strong>👨‍🏫 Hoca Yönetimi</strong><button onclick="closeAllPanels()">✕</button></div>
    <div class="admin-only" style="margin-top:15px;">
        <input type="text" id="nTName" placeholder="Hoca Adı">
        <input type="number" id="nTRate" placeholder="Ders Başı Ücret ₺" style="margin-top:8px; width:100%; padding:8px;">
        <button onclick="addTeacher()" style="margin-top:10px; width:100%; background:var(--blue); color:white; border:none; padding:10px; border-radius:8px;">EKLE</button>
    </div>
    <hr><div id="tList"></div>
</div>

<div class="top-bar" style="display:flex; gap:10px; margin-bottom:15px;">
    <button onclick="document.getElementById('tableModal').style.display='block'" style="flex:1; padding:12px; background:var(--dark); color:white; border:none; border-radius:10px; font-weight:bold;">🔍 HAFTALIK PROGRAM</button>
    <button onclick="oP('pTeachers')" style="padding:12px; background:var(--blue); color:white; border:none; border-radius:10px;">👨‍🏫 HOCALAR</button>
    <button onclick="oP('pStudents')" style="padding:12px; background:var(--green); color:white; border:none; border-radius:10px;">👥 ÖĞRENCİLER</button>
    <button onclick="document.getElementById('loginModal').style.display='flex'" id="modBtn" style="padding:12px; background:var(--pink); color:white; border:none; border-radius:10px;">MOD</button>
</div>

<div id="adminArea" class="admin-only" style="background:white; padding:15px; border-radius:15px; border:2px dashed var(--pink); margin-bottom:15px;">
    <strong>➕ Yeni Ders Planla</strong>
    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; margin-top:10px;">
        <input type="text" id="sName" placeholder="Öğrenci..." onclick="showStudentSuggest()">
        <select id="lBranch"></select>
        <select id="tSelect"></select>
        <input type="date" id="lDate">
        <input type="time" id="lTime">
        <button onclick="addLesson()" style="background:var(--pink); color:white; border:none; border-radius:8px; font-weight:bold;">KAYDET</button>
    </div>
</div>

<div id="lessonList"></div>

<div id="tableModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:40000; overflow:auto;">
    <button onclick="document.getElementById('tableModal').style.display='none'" style="position:fixed; top:20px; right:20px; background:var(--red); color:white; border:none; border-radius:50%; width:40px; height:40px; font-weight:bold;">✕</button>
    <div style="padding:60px 10px;">
        <table id="progTable">
            <thead><tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr></thead>
            <tbody><tr><td><div id="day-1"></div></td><td><div id="day-2"></div></td><td><div id="day-3"></div></td><td><div id="day-4"></div></td><td><div id="day-5"></div></td><td><div id="day-6"></div></td><td><div id="day-0"></div></td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
    let sDB = [], tMap = {}, lessonsData = [];

    function checkPass() { if(document.getElementById('passInput').value === "1234") { document.getElementById('bodyTag').classList.add('is-admin'); document.getElementById('loginModal').style.display='none'; render(); } }
    function oP(id) { closeAllPanels(); document.getElementById(id).style.display = 'block'; document.getElementById('panelOverlay').style.display = 'block'; }
    function closeAllPanels() { document.querySelectorAll('.side-panel').forEach(p => p.style.display='none'); document.getElementById('panelOverlay').style.display='none'; }

    // ÖDEME DÖNGÜSÜ (Görsel 4 - Tıklayınca Değişir)
    async function cyclePay(id, current) {
        if(!document.getElementById('bodyTag').classList.contains('is-admin')) return;
        const states = ['Ödenmedi', 'Ödendi', 'Ön Ödeme'];
        let next = states[(states.indexOf(current) + 1) % states.length];
        await db.collection("dersler").doc(id).update({ isPaid: next });
    }

    function sync() {
        db.collection("hocalar").onSnapshot(snap => {
            const s1 = document.getElementById('tSelect'), list = document.getElementById('tList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            s1.innerHTML = ""; list.innerHTML = "";
            snap.forEach(doc => {
                tMap[doc.data().name] = doc.data().rate || 0;
                s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b> ${isAdmin ? `(${doc.data().rate}₺) <button onclick="del('hocalar','${doc.id}')" style="float:right; color:red; border:none; background:none;">Sil</button>` : ''}</div>`;
            });
        });
        db.collection("ogrenciler").onSnapshot(snap => {
            sDB = []; const list = document.getElementById('studentDBList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            list.innerHTML = "";
            snap.forEach(doc => {
                sDB.push(doc.data());
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b> ${isAdmin ? `<br><small>${doc.data().price}₺ - ${doc.data().payStatus}</small> <button onclick="del('ogrenciler','${doc.id}')" style="float:right; color:red; border:none; background:none;">Sil</button>` : ''}</div>`;
            });
        });
        db.collection("branslar").onSnapshot(snap => {
            const b = document.getElementById('lBranch'); b.innerHTML = "";
            snap.forEach(doc => b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        });
    }

    function render() {
        const isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").orderBy("time").onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            lessonsData = [];
            snap.forEach(d => lessonsData.push({id: d.id, ...d.data()}));
            
            const grids = [0,1,2,3,4,5,6].map(i => document.getElementById('day-'+i));
            grids.forEach(g => g.innerHTML = "");

            lessonsData.forEach(data => {
                const dt = new Date(data.time);
                const isAbs = data.status === 'Gelmedi', isDone = !!data.checkIn, isTelafi = data.type === 'Telafi';
                
                // ÇAKIŞMA KONTROLÜ (Aynı saat, aynı hoca)
                const conflict = lessonsData.find(l => l.id !== data.id && l.time === data.time && l.teacher === data.teacher);

                // TABLO İKONLARI
                const cell = document.getElementById('day-'+dt.getDay());
                if(cell) {
                    let icons = isDone ? '<span class="status-icon" style="color:green;">✅</span>' : (isAbs ? '<span class="status-icon" style="color:red;">❌</span>' : '');
                    let warn = conflict ? '<span class="conflict-alert" title="Hoca Çakışması!">⚠️</span>' : '';
                    cell.innerHTML += `<div class="mini-lesson">${icons}${warn}<b>${dt.getHours()}:${dt.getMinutes()}</b> ${data.branch} - ${data.teacher}</div>`;
                }

                const payClass = data.isPaid === 'Ödendi' ? 'bg-paid' : (data.isPaid === 'Ön Ödeme' ? 'bg-pre' : 'bg-unpaid');
                listDiv.innerHTML += `
                <div class="lesson-item ${isTelafi?'is-telafi':''}">
                    ${isAdmin ? `<button class="delete-btn" onclick="del('dersler','${data.id}')">X</button>` : ''}
                    ${isAdmin ? `<div class="pay-badge ${payClass}" onclick="cyclePay('${data.id}','${data.isPaid}')">${data.price}₺ - ${data.isPaid}</div>` : ''}
                    <strong>👤 ${data.student}</strong><br><small>👨‍🏫 ${data.teacher} | 🎸 ${data.branch}</small>
                    <div style="margin:10px 0;"><b>⏰ ${dt.getHours()}:${dt.getMinutes()}</b></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="fTime('${data.id}','checkIn','${data.checkIn||''}')" style="flex:2; background:var(--green); color:white; border:none; border-radius:8px; padding:10px;">${data.checkIn?data.checkIn:'GİRİŞ'}</button>
                        <button onclick="fTime('${data.id}','checkOut','${data.checkOut||''}')" style="flex:2; background:var(--blue); color:white; border:none; border-radius:8px;">${data.checkOut?data.checkOut:'ÇIKIŞ'}</button>
                        <button onclick="db.collection('dersler').doc('${data.id}').update({status:'${isAbs?'Bekliyor':'Gelmedi'}', checkIn:'', checkOut:''})" style="flex:1; background:#666; color:white; border:none; border-radius:8px;">${isAbs?'GELDİ':'GELMEDİ'}</button>
                    </div>
                </div>`;
            });
        });
    }

    async function del(c, id) { if(confirm('Silinecek, emin misiniz?')) await db.collection(c).doc(id).delete(); }
    async function fTime(id, f, v) { let n = v === "" ? new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}) : ""; await db.collection("dersler").doc(id).update({ [f]: n, status: 'Geldi' }); }
    async function addDBStudent() {
        const n = document.getElementById('dbSName').value, p = document.getElementById('dbSPrice').value, s = document.getElementById('dbSPayStatus').value;
        if(n) await db.collection("ogrenciler").add({ name: n, price: parseFloat(p)||0, payStatus: s });
    }
    async function addTeacher() { const n = document.getElementById('nTName').value, r = document.getElementById('nTRate').value; if(n) await db.collection("hocalar").add({name:n, rate: parseFloat(r)||0}); }
    async function addLesson() {
        const s = document.getElementById('sName').value, h = document.getElementById('tSelect').value, d = document.getElementById('lDate').value, t = document.getElementById('lTime').value;
        const stu = sDB.find(x => x.name === s);
        if(!stu) return alert("Öğrenci Seçiniz!");
        await db.collection("dersler").add({ student:s, teacher:h, time:`${d}T${t}`, branch:document.getElementById('lBranch').value, type:'Normal', price:stu.price, isPaid:stu.payStatus, status:'Bekliyor', checkIn:'', checkOut:'' });
    }

    sync(); render();
</script>
</body>
</html>
