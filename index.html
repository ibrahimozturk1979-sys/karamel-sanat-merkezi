<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.30 - Stable</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --yellow: #ffeb3b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; }
        
        /* OVERLAY (Boşluğa basınca kapatma) */
        .global-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 20000; }
        
        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 350px; height: 100%; background: white; z-index: 30000; box-shadow: -5px 0 25px rgba(0,0,0,0.1); padding: 20px; border-left: 5px solid var(--pink); overflow-y: auto; }
        
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }

        /* BUTONLAR */
        .top-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .top-btn { flex: 1; min-width: 140px; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .top-btn:active { transform: scale(0.95); }

        /* TABLO */
        #tableModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 40000; overflow: auto; }
        .weekly-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .weekly-table th { background: var(--dark); color: white; padding: 10px; }
        .weekly-table td { border: 1px solid #ddd; padding: 8px; vertical-align: top; background: #fff; min-height: 90px; }

        /* DERS KARTLARI */
        #lessonList { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status-btn { border: none; border-radius: 8px; padding: 10px; color: white; font-weight: bold; cursor: pointer; flex: 1; font-size: 11px; }

        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; }
        .btn-pink { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body id="bodyTag">

<div id="globalOverlay" class="global-overlay" onclick="closeEverything()"></div>

<div id="payPopup" class="global-overlay" style="z-index: 60000; justify-content: center; align-items: center; display: none;" onclick="this.style.display='none'">
    <div style="background:white; padding:25px; border-radius:20px; width:280px;" onclick="event.stopPropagation()">
        <h4 style="margin:0 0 15px 0;">Ödeme Durumu</h4>
        <select id="newPayStatus">
            <option value="Ödenmedi">Ödenmedi</option>
            <option value="Ödendi">Ödendi</option>
            <option value="Ön Ödeme">Ön Ödeme</option>
        </select>
        <button class="btn-pink" id="savePayBtn" style="width:100%; margin-top:15px;">KAYDET</button>
    </div>
</div>

<div id="pStudents" class="side-panel">
    <h3>Öğrenci Listesi</h3><hr>
    <div class="admin-only">
        <input type="text" id="dbSName" placeholder="Ad Soyad">
        <input type="number" id="dbSPrice" placeholder="Ücret ₺">
        <button class="btn-pink" onclick="addDBStudent()" style="width:100%; margin-top:5px;">YENİ ÖĞRENCİ EKLE</button>
    </div>
    <div id="studentDBList" style="margin-top:15px;"></div>
</div>

<div id="pTeachers" class="side-panel">
    <h3>Hoca Yönetimi</h3><hr>
    <div class="admin-only">
        <input type="text" id="nTName" placeholder="Hoca Adı">
        <input type="number" id="nTRate" placeholder="Ders Ücreti ₺">
        <button class="btn-pink" onclick="addTeacher()" style="width:100%; margin-top:5px;">HOCA EKLE</button>
    </div>
    <div id="tList" style="margin-top:15px;"></div>
</div>

<div id="pBranches" class="side-panel">
    <h3>Branşlar</h3><hr>
    <input type="text" id="nBName" placeholder="Branş Adı">
    <button class="btn-pink" onclick="addBranch()" style="width:100%; margin-top:5px;">BRANŞ EKLE</button>
    <div id="bList" style="margin-top:15px;"></div>
</div>

<div id="pReports" class="side-panel">
    <h3>Hakediş & Devamsızlık</h3><hr>
    <div id="payrollArea"></div>
    <h4 style="color:var(--red); margin-top:20px;">🚫 Gelmeyenler</h4>
    <div id="absentLog"></div>
</div>

<div class="container">
    <div class="top-bar">
        <button onclick="oM('tableModal')" class="top-btn" style="background:var(--dark); color:white;">🔍 PROGRAMI GÖRÜNTÜLE</button>
        <button onclick="oP('pTeachers')" class="top-btn" style="background:var(--blue); color:white;">👨‍🏫 HOCALAR</button>
        <button onclick="oP('pStudents')" class="top-btn" style="background:var(--green); color:white;">👥 ÖĞRENCİLER</button>
        
        <button onclick="oP('pBranches')" class="top-btn admin-only" style="background:var(--pink); color:white;">🎨 BRANŞLAR</button>
        <button onclick="oP('pReports')" class="top-btn admin-only" style="background:#6366f1; color:white;">💰 HAKEDİŞ / DEVAM</button>
        
        <button class="top-btn" style="background:#888; color:white;" onclick="oM('loginModal')">MOD</button>
        <button class="top-btn admin-only" onclick="logout()" style="background:var(--red); color:white;">ÇIKIŞ</button>
    </div>

    <div class="admin-only" style="background:white; padding:20px; border-radius:15px; margin-bottom:20px; border:2px dashed var(--pink);">
        <h4 style="margin:0 0 10px 0;">➕ Yeni Ders Planla</h4>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:10px;">
            <input type="text" id="sName" placeholder="Öğrenci Seç..." onclick="showAllStudents()">
            <select id="lBranch"></select>
            <select id="tSelect"></select>
            <select id="lType"><option value="Normal">Normal</option><option value="Telafi">Telafi</option></select>
            <input type="date" id="lDate">
            <input type="time" id="lTime">
            <button class="btn-pink" onclick="addLesson()">KAYDET</button>
        </div>
        <div id="sSuggest" style="display:none; background:white; border:1px solid #ddd; max-height:200px; overflow:auto;"></div>
    </div>

    <div id="lessonList"></div>
</div>

<div id="tableModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:50000; overflow:auto;">
    <button onclick="closeEverything()" style="position:fixed; top:10px; right:10px; background:var(--red); color:white; border:none; padding:15px; border-radius:50%; z-index:50001; cursor:pointer;">X</button>
    <div style="padding:60px 10px;">
        <table class="weekly-table">
            <thead><tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr></thead>
            <tbody id="weeklyBody"><tr><td><div id="day-1"></div></td><td><div id="day-2"></div></td><td><div id="day-3"></div></td><td><div id="day-4"></div></td><td><div id="day-5"></div></td><td><div id="day-6"></div></td><td><div id="day-0"></div></td></tr></tbody>
        </table>
    </div>
</div>

<div id="loginModal" class="global-overlay" style="display:none; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:20px; text-align:center;" onclick="event.stopPropagation()">
        <h3>Yönetici Girişi</h3>
        <input type="password" id="passInput" style="text-align:center;">
        <button class="btn-pink" onclick="checkPass()" style="margin-top:15px; width:100%;">GİRİŞ</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
    let tMap = {}, sDB = [];

    // PANEL FONKSİYONLARI
    function oP(id) { closeEverything(); document.getElementById(id).style.display = 'block'; document.getElementById('globalOverlay').style.display = 'block'; }
    function oM(id) { document.getElementById(id).style.display = 'block'; }
    function closeEverything() {
        document.querySelectorAll('.side-panel, .global-overlay, #tableModal, #loginModal').forEach(el => el.style.display = 'none');
    }

    function checkPass() { if(document.getElementById('passInput').value === "1234") { document.getElementById('bodyTag').classList.add('is-admin'); closeEverything(); render(); } }
    function logout() { document.getElementById('bodyTag').classList.remove('is-admin'); render(); }

    function showAllStudents() {
        const box = document.getElementById('sSuggest'); box.innerHTML = "";
        sDB.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
            const d = document.createElement('div'); d.innerText = s.name; d.style.padding='10px'; d.style.borderBottom='1px solid #eee'; d.style.cursor='pointer';
            d.onclick = () => { document.getElementById('sName').value = s.name; box.style.display='none'; }; box.appendChild(d);
        });
        box.style.display = 'block';
    }

    function openPayPopup(id, cur) {
        if(!document.getElementById('bodyTag').classList.contains('is-admin')) return;
        const pop = document.getElementById('payPopup'); pop.style.display = 'flex';
        document.getElementById('newPayStatus').value = cur;
        document.getElementById('savePayBtn').onclick = async () => {
            await db.collection("dersler").doc(id).update({ isPaid: document.getElementById('newPayStatus').value });
            pop.style.display = 'none';
        };
    }

    async function updateStatus(id, field) {
        if(confirm(field.toUpperCase() + " saati girilsin mi?")) {
            const time = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            await db.collection("dersler").doc(id).update({ [field]: time, status: 'Geldi' });
        }
    }

    function sync() {
        db.collection("hocalar").onSnapshot(snap => {
            const s1 = document.getElementById('tSelect'), list = document.getElementById('tList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            s1.innerHTML = ""; list.innerHTML = "";
            snap.forEach(doc => { 
                tMap[doc.data().name] = doc.data().rate || 0;
                s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b> ${isAdmin ? `<br><small>${doc.data().rate}₺</small> <button onclick="del('hocalar','${doc.id}')" style="float:right; color:red;">Sil</button>` : ''}</div>`;
            });
        });
        db.collection("branslar").onSnapshot(snap => {
            const b = document.getElementById('lBranch'), list = document.getElementById('bList');
            b.innerHTML = ""; list.innerHTML = "";
            snap.forEach(doc => {
                b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee;">${doc.data().name} <button onclick="del('branslar','${doc.id}')" style="float:right; color:red;">X</button></div>`;
            });
        });
        db.collection("ogrenciler").onSnapshot(snap => {
            sDB = []; const list = document.getElementById('studentDBList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            list.innerHTML = "";
            snap.forEach(doc => { 
                sDB.push(doc.data()); 
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b> ${isAdmin ? `<br><small>${doc.data().price}₺ - ${doc.data().payStatus}</small> <button onclick="del('ogrenciler','${doc.id}')" style="float:right; color:red;">Sil</button>` : ''}</div>`;
            });
        });
    }

    function render() {
        const isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").orderBy("time").onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            const grids = [0,1,2,3,4,5,6].map(i => document.getElementById('day-'+i));
            grids.forEach(g => g.innerHTML = "");
            let hakedis = {}, absents = "";

            snap.forEach(doc => {
                const d = doc.data(); const dt = new Date(d.time);
                const isAbs = d.status === 'Gelmedi', isDone = !!d.checkIn, isOut = !!d.checkOut;
                
                const cell = document.getElementById('day-'+dt.getDay());
                if(cell) cell.innerHTML += `<div style="font-size:10px; margin-bottom:5px; padding:3px; background:${isDone?'#e8f5e9':'#fff'}">${isDone?'✅':''} ${isAbs?'🚫':''} <b>${dt.getHours()}:${dt.getMinutes()}</b> ${d.student}<br><i>${d.teacher}</i></div>`;

                if(isAbs) absents += `<div style="padding:5px; border-bottom:1px solid #eee;">${d.student} - ${d.teacher} (${dt.toLocaleDateString()})</div>`;
                else hakedis[d.teacher] = (hakedis[d.teacher] || 0) + 1;

                listDiv.innerHTML += `
                <div class="lesson-item">
                    ${isAdmin ? `<div onclick="openPayPopup('${doc.id}','${d.isPaid}')" style="position:absolute; top:10px; right:10px; font-size:11px; font-weight:bold; color:${d.isPaid==='Ödendi'?'green':'red'}; cursor:pointer; text-decoration:underline;">${d.price}₺ - ${d.isPaid}</div>` : ''}
                    <strong>${d.student}</strong> ${d.type==='Telafi'?'<span class="telafi-label">TELAFİ</span>':''}<br>
                    <small>${d.teacher} | ${d.branch}</small><br>
                    <b>⏰ ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</b>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="status-btn" style="background:var(--green);" onclick="updateStatus('${doc.id}','checkIn')">${d.checkIn || 'GİRİŞ'}</button>
                        <button class="status-btn" style="background:var(--blue);" onclick="updateStatus('${doc.id}','checkOut')">${d.checkOut || 'ÇIKIŞ'}</button>
                        <button class="status-btn" style="background:#666;" onclick="db.collection('dersler').doc('${doc.id}').update({status:'${isAbs?'Bekliyor':'Gelmedi'}', checkIn:'', checkOut:''})">${isAbs?'GELDİ':'GELMEDİ'}</button>
                        ${isAdmin ? `<button class="status-btn" style="background:var(--red);" onclick="del('dersler','${doc.id}')">SİL</button>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('absentLog').innerHTML = absents;
            let pL = ""; for(let t in hakedis) pL += `<div style="padding:5px; border-bottom:1px solid #eee;">${t}: ${hakedis[t]} Ders (${hakedis[t]*(tMap[t]||0)}₺)</div>`;
            document.getElementById('payrollArea').innerHTML = pL;
        });
    }

    async function addLesson() {
        const s = document.getElementById('sName').value, h = document.getElementById('tSelect').value, d = document.getElementById('lDate').value, t = document.getElementById('lTime').value;
        const stu = sDB.find(x => x.name === s);
        if(!stu || !h || !d || !t) return alert("Eksik bilgi!");
        await db.collection("dersler").add({ student:s, teacher:h, time:`${d}T${t}`, branch:document.getElementById('lBranch').value, type:document.getElementById('lType').value, price:stu.price, isPaid:stu.payStatus, status:'Bekliyor', checkIn:'', checkOut:'' });
        alert("Eklendi!");
    }

    async function del(c, id) { if(confirm('Silinsin mi?')) await db.collection(c).doc(id).delete(); }

    sync(); render();
</script>
</body>
</html>
