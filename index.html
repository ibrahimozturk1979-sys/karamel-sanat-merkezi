<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.40 - Speed</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --yellow: #ffeb3b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; color: #333; }
        
        /* OVERLAYS */
        #panelOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 25000; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .is-admin .admin-flex { display: flex !important; }

        .top-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .top-btn { flex: 1; min-width: 120px; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 12px; }

        /* YAN PANELLER */
        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100%; background: white; z-index: 30000; box-shadow: -5px 0 25px rgba(0,0,0,0.2); padding: 20px; border-left: 5px solid var(--pink); box-sizing: border-box; overflow-y: auto; }
        
        /* KAYIT PANELI */
        .admin-quad-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; position: relative; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-pink { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* TABLO */
        #tableModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 40000; overflow: auto; }
        .weekly-table { width: 100%; border-collapse: collapse; min-width: 1100px; table-layout: fixed; }
        .weekly-table th { background: var(--dark); color: white; padding: 12px; border: 1px solid #444; }
        .weekly-table td { border: 1px solid #ddd; padding: 8px; vertical-align: top; background: #fff; min-height: 100px; }
        
        .mini-lesson { font-size: 11px; padding: 6px; border-radius: 6px; margin-bottom: 5px; border: 1px solid #eee; background: #fdfdfd; }
        .mini-active { background: #d1fae5 !important; border-color: var(--green) !important; font-weight: bold; }
        .mini-telafi { background: var(--yellow) !important; border-color: #fbc02d !important; }

        /* DERS KARTLARI */
        #lessonList { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .is-telafi { border-left-color: var(--yellow) !important; background: #fffdf0; }
        .telafi-label { background: var(--yellow); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-left: 10px; }
        .card-finance { position: absolute; top: 15px; right: 15px; text-align: right; font-size: 11px; font-weight: bold; cursor: pointer; text-decoration: underline; }

        /* LOGIN MODAL */
        #loginModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:50000; justify-content:center; align-items:center; }
        .login-box { background:white; padding:40px; border-radius:25px; text-align:center; width:280px; }
    </style>
</head>
<body id="bodyTag">

<div id="panelOverlay" onclick="closeAllPanels()"></div>

<div id="loginModal">
    <div class="login-box">
        <h3>Yönetici Girişi</h3>
        <input type="password" id="passInput" placeholder="Şifre" style="text-align:center; font-size:20px;">
        <button class="btn-pink" onclick="checkPass()" style="margin-top:20px;">GİRİŞ YAP</button>
    </div>
</div>

<div id="pTeachers" class="side-panel">
    <div style="display:flex; justify-content:space-between;"><strong>👨‍🏫 Hocalar</strong><button onclick="cP('pTeachers')">✕</button></div>
    <div class="admin-only" style="margin-top:10px;">
        <input type="text" id="nTName" placeholder="Hoca Adı">
        <input type="number" id="nTRate" placeholder="Ücret ₺">
        <button class="btn-pink" onclick="addTeacher()" style="margin-top:5px;">EKLE</button>
    </div>
    <hr><div id="tList"></div>
</div>

<div id="pStudents" class="side-panel">
    <div style="display:flex; justify-content:space-between;"><strong>👥 Öğrenci & Finans</strong><button onclick="cP('pStudents')">✕</button></div>
    <div class="admin-only" style="margin-top:10px;">
        <input type="text" id="dbSName" placeholder="Ad Soyad">
        <input type="number" id="dbSPrice" placeholder="Ücret ₺">
        <select id="dbSPayStatus"><option value="Ödenmedi">Ödenmedi</option><option value="Ödendi">Ödendi</option></select>
        <button class="btn-pink" onclick="addDBStudent()" style="margin-top:5px;">KAYDET</button>
    </div>
    <hr><div id="studentDBList"></div>
</div>

<div id="pReports" class="side-panel">
    <div style="display:flex; justify-content:space-between;"><strong>💰 Hakediş & Devam</strong><button onclick="cP('pReports')">✕</button></div>
    <div id="payrollArea"></div>
    <h4 style="color:var(--red);">🚫 Gelmeyenler</h4>
    <div id="absentLog"></div>
</div>

<div id="tableModal">
    <button onclick="document.getElementById('tableModal').style.display='none'" style="position:fixed; top:20px; right:20px; z-index:40001; background:var(--red); color:white; border:none; border-radius:50%; width:45px; height:45px; font-weight:bold; cursor:pointer;">✕</button>
    <div style="padding:70px 10px 20px 10px; overflow-x:auto;">
        <table class="weekly-table">
            <thead><tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr></thead>
            <tbody id="weeklyBody"><tr><td><div id="day-1"></div></td><td><div id="day-2"></div></td><td><div id="day-3"></div></td><td><div id="day-4"></div></td><td><div id="day-5"></div></td><td><div id="day-6"></div></td><td><div id="day-0"></div></td></tr></tbody>
        </table>
    </div>
</div>

<div class="container">
    <div class="top-bar">
        <button onclick="document.getElementById('tableModal').style.display='block'" class="top-btn" style="background:var(--dark); color:white;">🔍 PROGRAMI GÖRÜNTÜLE</button>
        <button onclick="oP('pTeachers')" class="top-btn" style="background:var(--blue); color:white;">👨‍🏫 HOCALAR</button>
        <button onclick="oP('pStudents')" class="top-btn" style="background:var(--green); color:white;">👥 ÖĞRENCİLER</button>
        <button onclick="document.getElementById('loginModal').style.display='flex'" id="modBtn" class="top-btn" style="background:var(--pink); color:white;">MOD</button>
        <button onclick="logout()" id="exitBtn" class="top-btn admin-only" style="background:var(--red); color:white;">ÇIKIŞ</button>
    </div>

    <div class="admin-only admin-flex" style="gap:8px; margin-bottom:15px; display:none;">
        <button onclick="oP('pReports')" class="top-btn" style="background:white; border:1px solid #ddd; color:#333;">💰 HAKEDİŞ / DEVAM</button>
        <button onclick="oP('pBranches')" class="top-btn" style="background:white; border:1px solid #ddd; color:#333;">🎨 BRANŞLAR</button>
    </div>

    <div class="admin-only" id="adminArea">
        <div class="card" style="border:2px dashed var(--pink); margin-bottom:20px;">
            <strong>➕ Yeni Ders Planla</strong>
            <div class="admin-quad-grid">
                <div><input type="text" id="sName" placeholder="Öğrenci Adı..." oninput="showSuggest(this)"><div id="sSuggest" style="background:white; border:1px solid #ddd; display:none; position:absolute; z-index:1000; width:90%;"></div></div>
                <div><select id="lBranch"></select><select id="tSelect" style="margin-top:5px;"></select></div>
                <div><select id="lType"><option value="Normal">Normal Ders</option><option value="Telafi">Telafi Dersi</option></select></div>
                <div><input type="date" id="lDate"><input type="time" id="lTime" style="margin-top:5px;"></div>
                <div style="display:flex; align-items:center;"><button class="btn-pink" onclick="addLesson()">KAYDET</button></div>
            </div>
        </div>
    </div>

    <div id="lessonList"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
    let tMap = {}, sDB = [];

    function checkPass() { 
        if(document.getElementById('passInput').value === "1234") { 
            document.getElementById('bodyTag').classList.add('is-admin'); 
            document.getElementById('loginModal').style.display='none'; 
            document.getElementById('modBtn').style.display='none';
            render(); 
        } else { alert("Şifre Yanlış!"); }
    }
    function logout() { 
        document.getElementById('bodyTag').classList.remove('is-admin'); 
        document.getElementById('modBtn').style.display='block';
        render(); 
    }

    function oP(id) { closeAllPanels(); document.getElementById(id).style.display = 'block'; document.getElementById('panelOverlay').style.display = 'block'; }
    function cP(id) { document.getElementById(id).style.display = 'none'; document.getElementById('panelOverlay').style.display = 'none'; }
    function closeAllPanels() { document.querySelectorAll('.side-panel').forEach(p => p.style.display = 'none'); document.getElementById('panelOverlay').style.display = 'none'; }

    // GİRİŞ ÇIKIŞ (TEK TIKLA)
    async function fastTime(id, field, currentVal) {
        let newVal = currentVal === "" ? new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}) : "";
        await db.collection("dersler").doc(id).update({ [field]: newVal, status: 'Geldi' });
    }

    function sync() {
        db.collection("hocalar").orderBy("name").onSnapshot(snap => {
            const s1 = document.getElementById('tSelect'), list = document.getElementById('tList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            s1.innerHTML = ""; list.innerHTML = "";
            snap.forEach(doc => { 
                tMap[doc.data().name] = doc.data().rate || 0;
                s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b> ${isAdmin?`(${doc.data().rate}₺)` : ''}</div>`;
            });
        });
        db.collection("ogrenciler").orderBy("name").onSnapshot(snap => {
            sDB = []; const list = document.getElementById('studentDBList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            list.innerHTML = "";
            snap.forEach(doc => {
                sDB.push(doc.data());
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b> ${isAdmin?`(${doc.data().price}₺)` : ''}</div>`;
            });
        });
        db.collection("branslar").onSnapshot(snap => {
            const b = document.getElementById('lBranch'); b.innerHTML = "";
            snap.forEach(doc => b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        });
    }

    function render() {
        const isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").orderBy("time").onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            const grids = [0,1,2,3,4,5,6].map(i => document.getElementById('day-'+i));
            grids.forEach(g => g.innerHTML = "");
            let hakedis = {}, absents = "";

            snap.forEach(doc => {
                const data = doc.data(); const dt = new Date(data.time);
                const isAbs = data.status === 'Gelmedi', isDone = !!data.checkIn, isTelafi = data.type === 'Telafi';
                
                const cell = document.getElementById('day-'+dt.getDay());
                if(cell) cell.innerHTML += `<div class="mini-lesson ${isTelafi?'mini-telafi':''} ${isDone?'mini-active':''}"><b>${dt.getHours()}:${dt.getMinutes()}</b> ${data.student}</div>`;

                if(isAbs) absents += `<div>${data.student} - ${dt.toLocaleDateString()}</div>`;
                else hakedis[data.teacher] = (hakedis[data.teacher] || 0) + 1;

                listDiv.innerHTML += `
                <div class="lesson-item ${isTelafi?'is-telafi':''}">
                    ${isAdmin ? `<div class="card-finance" style="color:${data.isPaid==='Ödendi'?'green':'red'}">${data.price}₺ - ${data.isPaid}</div>` : ''}
                    <strong>${data.student}</strong> ${isTelafi?'<span class="telafi-label">TELAFİ</span>':''}<br>
                    <small>${data.teacher} | ${data.branch}</small><br>
                    <div style="margin:8px 0;"><b>⏰ ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</b></div>
                    <div style="display:flex; gap:5px;">
                        <button onclick="fastTime('${doc.id}','checkIn','${data.checkIn||''}')" style="flex:2; background:var(--green); color:white; border:none; border-radius:8px; padding:12px; font-weight:bold;">${data.checkIn?data.checkIn:'GİRİŞ'}</button>
                        <button onclick="fastTime('${doc.id}','checkOut','${data.checkOut||''}')" style="flex:2; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">${data.checkOut?data.checkOut:'ÇIKIŞ'}</button>
                        <button onclick="db.collection('dersler').doc('${doc.id}').update({status:'${isAbs?'Bekliyor':'Gelmedi'}', checkIn:'', checkOut:''})" style="flex:1; background:#666; color:white; border:none; border-radius:8px;">${isAbs?'GELDİ':'GELMEDİ'}</button>
                        ${isAdmin ? `<button onclick="db.collection('dersler').doc('${doc.id}').delete()" style="background:var(--red); color:white; border:none; border-radius:8px; width:40px;">X</button>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('absentLog').innerHTML = absents;
            let pL = ""; for(let t in hakedis) pL += `<div>${t}: ${hakedis[t]} Ders (${hakedis[t]*(tMap[t]||0)}₺)</div>`;
            document.getElementById('payrollArea').innerHTML = pL;
        });
    }

    async function addLesson() {
        const s = document.getElementById('sName').value, h = document.getElementById('tSelect').value, d = document.getElementById('lDate').value, t = document.getElementById('lTime').value;
        const stu = sDB.find(x => x.name === s);
        if(!stu || !h || !d || !t) return alert("Eksik!");
        await db.collection("dersler").add({ student:s, teacher:h, time:`${d}T${t}`, branch:document.getElementById('lBranch').value, type:document.getElementById('lType').value, price:stu.price, isPaid:stu.payStatus, status:'Bekliyor', checkIn:'', checkOut:'' });
        document.getElementById('sName').value = ""; alert("Eklendi!");
    }

    function showSuggest(el) {
        const val = el.value.toLowerCase(), box = document.getElementById('sSuggest');
        box.innerHTML = ""; if(!val) { box.style.display='none'; return; }
        sDB.filter(s => s.name.toLowerCase().includes(val)).forEach(s => {
            const div = document.createElement("div"); div.innerText = s.name; div.style.padding='10px;cursor:pointer;border-bottom:1px solid #eee;';
            div.onclick = () => { el.value = s.name; box.style.display='none'; }; box.appendChild(div);
        });
        box.style.display = 'block';
    }

    sync(); render();
</script>
</body>
</html>
