<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.12 - Database & Autocomplete</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; color: #333; }

        /* YAN PANELLER */
        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100%; background: white; z-index: 30000; box-shadow: -5px 0 25px rgba(0,0,0,0.15); padding: 20px; animation: slideIn 0.3s ease; border-left: 5px solid var(--pink); box-sizing: border-box; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @media (max-width: 600px) { .side-panel { width: 95%; } }

        /* AUTOCOMPLETE (İsim Önerisi) */
        .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; border-bottom: none; border-top: none; z-index: 99; top: 100%; left: 0; right: 0; background: white; border-radius: 0 0 10px 10px; max-height: 150px; overflow-y: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #d4d4d4; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }

        /* MODAL & CARD */
        .admin-bar { display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .is-admin .admin-bar, .is-admin #adminArea { display: grid; }
        #adminArea { display: none; margin-bottom: 15px; }
        .bar-btn { background: white; border: 1px solid #ddd; padding: 12px 5px; border-radius: 15px; font-size: 11px; cursor: pointer; text-align: center; font-weight: bold; }
        
        .reg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media (max-width: 900px) { .reg-grid { grid-template-columns: 1fr; } }

        /* DERS KARTI & ÖDEME BADGE */
        #lessonList { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .pay-badge-fixed { position: absolute; top: 12px; right: 12px; padding: 5px 12px; border-radius: 10px; font-size: 11px; color: white; font-weight: bold; z-index: 5; }

        .btn-pink { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; font-size: 13px; box-sizing: border-box; }
        
        #payPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 40000; justify-content: center; align-items: center; }
    </style>
</head>
<body id="bodyTag">

<div id="payPopup">
    <div style="background:white; padding:25px; border-radius:20px; width:280px; text-align:center;">
        <h3 id="popStudent">Ödeme Güncelle</h3>
        <select id="popStatus" onchange="togglePriceLock()"><option value="Ödenmedi">Ödenmedi</option><option value="Ödendi">Ödendi</option><option value="Ön Ödeme">Ön Ödeme</option></select>
        <input type="number" id="popPrice" placeholder="Ücret ₺">
        <button class="btn-pink" onclick="savePayment()" style="width:100%; margin-top:15px;">GÜNCELLE</button>
        <button onclick="document.getElementById('payPopup').style.display='none'" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Kapat</button>
    </div>
</div>

<div id="pStudents" class="side-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eee; padding-bottom:10px; margin-bottom:15px;">
        <strong>👥 Öğrenci Veritabanı</strong><button onclick="cP('pStudents')" style="border:none; background:none; font-size:20px;">✕</button>
    </div>
    <div style="background:#f9f9f9; padding:10px; border-radius:10px; margin-bottom:15px;">
        <input type="text" id="newSName" placeholder="Yeni Öğrenci Adı">
        <input type="number" id="newSPrice" placeholder="Standart Ders Ücreti ₺">
        <button class="btn-pink" onclick="addNewStudent()" style="margin-top:10px; font-size:12px;">ÖĞRENCİYİ KAYDET</button>
    </div>
    <div id="studentDBList" style="overflow-y:auto; max-height:60vh;"></div>
</div>

<div id="pPerf" class="side-panel"><div class="panel-header"><strong>💰 Hakediş</strong><button onclick="cP('pPerf')">✕</button></div><div id="payrollArea"></div></div>
<div id="pAbs" class="side-panel"><div class="panel-header"><strong>🚫 Devamsızlık</strong><button onclick="cP('pAbs')">✕</button></div><div id="absentLog"></div></div>

<div class="container">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button onclick="document.getElementById('tableModal').style.display='block'" style="flex:4; background:var(--dark); color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; cursor:pointer;">🔍 PROGRAMI GÖRÜNTÜLE</button>
        <button onclick="openLogin()" style="flex:1; background:var(--pink); color:white; border:none; border-radius:15px; font-weight:bold;">MOD</button>
    </div>

    <div class="admin-bar">
        <div class="bar-btn" onclick="oP('pPerf')">💰<br>Hakediş</div>
        <div class="bar-btn" onclick="oP('pAbs')">🚫<br>Devamsızlık</div>
        <div class="bar-btn" onclick="oP('pStudents')">👥<br>Öğrenciler</div>
        <div class="bar-btn" onclick="oP('pTeachers')">👨‍🏫<br>Hocalar</div>
        <div class="bar-btn" onclick="oP('pBranches')">🎨<br>Branşlar</div>
    </div>

    <div id="adminArea">
        <div class="card" style="background:#fff; border:1px solid #ddd; padding:15px; border-radius:20px;">
            <div class="reg-grid">
                <div style="position:relative;">
                    <label><small>Öğrenci</small></label>
                    <input type="text" id="sName" placeholder="İsim Yazın..." oninput="onStudentInput(this)">
                    <div id="autocomplete-list" class="autocomplete-items"></div>
                    <input type="text" id="sPhoto" placeholder="Foto URL" style="margin-top:5px;">
                </div>
                <div><label><small>Ders</small></label><select id="lBranch"></select><select id="tSelect"></select><select id="lType"><option value="Normal">Normal</option><option value="Telafi">Telafi</option></select></div>
                <div><label><small>Zaman</small></label><input type="date" id="lDate"><input type="time" id="lTime"></div>
                <div><label><small>Finans</small></label><select id="pStatus"><option value="Ödenmedi">Ödenmedi</option><option value="Ödendi">Ödendi</option><option value="Ön Ödeme">Ön Ödeme</option></select><input type="number" id="lPrice" placeholder="Ücret ₺"><button class="btn-pink" onclick="addLesson()" style="margin-top:5px;">KAYDET</button></div>
            </div>
        </div>
    </div>

    <div id="lessonList"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let cEditId = null, tMap = {}, allL = [], studentDB = [];

    function oP(id) { document.querySelectorAll('.side-panel').forEach(p => p.style.display='none'); document.getElementById(id).style.display='block'; }
    function cP(id) { document.getElementById(id).style.display='none'; }
    function openLogin() { let p = prompt("Şifre:"); if(p==="1234") { document.getElementById('bodyTag').classList.add('is-admin'); loadLessons(); } }

    // ÖĞRENCİ VERİTABANI İŞLEMLERİ
    async function addNewStudent() {
        const name = document.getElementById('newSName').value;
        const price = document.getElementById('newSPrice').value;
        if(name) { await db.collection("ogrenciler").add({ name: name, defaultPrice: parseFloat(price)||0 }); document.getElementById('newSName').value=""; }
    }

    function syncDB() {
        db.collection("ogrenciler").orderBy("name").onSnapshot(s => {
            studentDB = []; const list = document.getElementById('studentDBList'); list.innerHTML = "";
            s.forEach(doc => {
                const d = doc.data(); studentDB.push({id: doc.id, ...d});
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; align-items:center;">
                    <div onclick="fillStudentData('${d.name}', ${d.defaultPrice})" style="cursor:pointer"><b>${d.name}</b><br><small>${d.defaultPrice}₺</small></div>
                    <span onclick="del('ogrenciler','${doc.id}')" style="color:red; cursor:pointer; font-weight:bold;">SİL</span>
                </div>`;
            });
        });
        // Hocalar ve Branşlar için eski senkronizasyon buraya... (Kısaltıldı)
    }

    // AUTOCOMPLETE
    function onStudentInput(el) {
        const val = el.value.toLowerCase();
        const list = document.getElementById('autocomplete-list');
        list.innerHTML = "";
        if(!val) return;
        const filtered = studentDB.filter(s => s.name.toLowerCase().includes(val));
        filtered.forEach(s => {
            const div = document.createElement("div");
            div.innerHTML = s.name;
            div.onclick = () => { el.value = s.name; document.getElementById('lPrice').value = s.defaultPrice; list.innerHTML = ""; };
            list.appendChild(div);
        });
    }

    // ÖDEME GÜNCELLEME (PLAN ÜZERİNDEN)
    function openPay(id, n, s, p) { 
        if(!document.getElementById('bodyTag').classList.contains('is-admin')) return; 
        cEditId=id; document.getElementById('popStudent').innerText=n; 
        document.getElementById('popStatus').value=s; document.getElementById('popPrice').value=p; 
        document.getElementById('payPopup').style.display='flex'; togglePriceLock(); 
    }
    function togglePriceLock() { document.getElementById('popPrice').disabled = (document.getElementById('popStatus').value !== "Ön Ödeme"); }
    async function savePayment() { await db.collection("dersler").doc(cEditId).update({ isPaid: document.getElementById('popStatus').value, price: parseFloat(document.getElementById('popPrice').value)||0 }); document.getElementById('payPopup').style.display='none'; }

    // DERS EKLEME
    async function addLesson() {
        const s = document.getElementById('sName').value, t = document.getElementById('tSelect').value, d = document.getElementById('lDate').value, tm = document.getElementById('lTime').value;
        if(!s || !t || !d || !tm) return alert("Eksik bilgi!");
        await db.collection("dersler").add({ 
            student:s, teacher:t, time:`${d}T${tm}`, branch:document.getElementById('lBranch').value, 
            type:document.getElementById('lType').value, photo:document.getElementById('sPhoto').value, 
            price:parseFloat(document.getElementById('lPrice').value)||0, isPaid:document.getElementById('pStatus').value, 
            status:'Bekliyor', checkIn:null, checkOut:null 
        });
    }

    function loadLessons() {
        const isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").onSnapshot(snap => {
            allL = []; const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data(); const dt = new Date(data.time);
                const stColor = data.isPaid === 'Ödendi' ? 'var(--green)' : (data.isPaid === 'Ön Ödeme' ? 'var(--blue)' : 'var(--red)');
                listDiv.innerHTML += `
                <div class="lesson-item">
                    ${isAdmin ? `<div class="pay-badge-fixed" style="background:${stColor}">${data.isPaid}</div>` : ''}
                    <div style="display:flex; align-items:center;">
                        <img onclick="openPay('${doc.id}','${data.student}','${data.isPaid}','${data.price}')" src="${data.photo||'https://cdn-icons-png.flaticon.com/512/194/194931.png'}" style="width:45px;height:45px;border-radius:50%;margin-right:12px;cursor:pointer;border:2px solid ${stColor}">
                        <div>
                            <strong onclick="openPay('${doc.id}','${data.student}','${data.isPaid}','${data.price}')" style="cursor:pointer">${data.student}</strong><br>
                            <small>${data.branch} - ${data.teacher} (${data.type})</small>
                        </div>
                    </div>
                    <div style="margin-top:10px; font-size:12px;">⏰ ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')} | ${dt.toLocaleDateString('tr-TR')}</div>
                    <div style="display:flex; gap:5px; margin-top:12px;">
                        <button onclick="tTime('${doc.id}','checkIn','${data.checkIn||''}')" style="flex:1; background:var(--green); color:white; border:none; border-radius:8px; padding:10px;">GİRİŞ</button>
                        <button onclick="tTime('${doc.id}','checkOut','${data.checkOut||''}')" style="flex:1; background:var(--blue); color:white; border:none; border-radius:8px; padding:10px;">ÇIKIŞ</button>
                        ${isAdmin ? `<button onclick="del('dersler','${doc.id}')" style="flex:0.4; background:var(--red); color:white; border:none; border-radius:8px;">SİL</button>` : ''}
                    </div>
                </div>`;
            });
        });
    }

    async function del(c, id) { if(confirm('Emin misiniz?')) await db.collection(c).doc(id).delete(); }
    async function tTime(id, f, v) { let n = v==="" ? new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : ""; await db.collection("dersler").doc(id).update({[f]:n}); }
    
    // Uygulama Başlatıcı (Eski sync fonksiyonlarını da içerir)
    syncDB(); loadLessons();
</script>
</body>
</html>
