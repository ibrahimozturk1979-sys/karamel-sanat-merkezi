<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.35 - Focus</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --yellow: #ffeb3b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; color: #333; overflow-x: hidden; }
        
        #panelOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 25000; }

        .top-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .top-btn { flex: 1; min-width: 140px; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-align: center; }

        /* YAN PANELLER (1/4 Ekran) */
        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100%; background: white; z-index: 30000; box-shadow: -5px 0 25px rgba(0,0,0,0.1); padding: 20px; border-left: 5px solid var(--pink); box-sizing: border-box; overflow-y: auto; }
        
        /* ADMIN HAKEDİŞ ALANI VE HOCA LISTESI GERI GELDİ (Görsel 1/2) */
        .admin-quad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        @media (max-width: 900px) { .admin-quad-grid { grid-template-columns: 1fr; } }
        
        .card { background: white; padding: 15px; border-radius: 15px; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-pink { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        /* HAFTALIK PROGRAM VE KART İKONLARI GERI GELDİ */
        #tableModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 40000; overflow: auto; }
        .weekly-table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        .weekly-table th { background: var(--dark); color: white; padding: 10px; border: 1px solid #444; }
        .weekly-table td { border: 1px solid #ddd; padding: 5px; vertical-align: top; background: #fff; min-height: 80px; }
        
        .mini-lesson { font-size: 10px; padding: 5px; border-radius: 5px; margin-bottom: 3px; border: 1px solid #eee; position: relative; }
        .mini-active { background: #d1fae5 !important; border-color: var(--green) !important; font-weight: bold; }
        .mini-absent { opacity: 0.6; background: #fee2e2 !important; border-color: var(--red) !important; }
        .mini-telafi { background: var(--yellow) !important; border-color: #fbc02d !important; }

        /* DERS KARTLARI (TELAFİ VE FİNANS DÜZELTİLDİ) (Görsel 4/5) */
        #lessonList { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .is-telafi-card { border-left-color: #fbc02d !important; border-left-style: dashed; }
        .telafi-badge { background: var(--yellow); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 8px; }

        .card-finance { position: absolute; top: 12px; right: 12px; font-size: 11px; font-weight: bold; text-align: right; text-decoration: underline; cursor: pointer; }

        /* GİRİŞ PANELI (ŞİFRE) DÜZELTİLDİ (Görsel 3) */
        #loginModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:50000; justify-content:center; align-items:center; }
        .login-card { background:white; padding:40px; border-radius:25px; text-align:center; width:300px; box-shadow:0 10px 30px rgba(0,0,0,0.3); }

        #adminArea { display: none; }
        .is-admin #adminArea { display: block; }
    </style>
</head>
<body id="bodyTag">

<div id="panelOverlay" onclick="closeAllPanels()"></div>

<div id="payPopup" class="side-panel" style="z-index: 60000; display: none;">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><strong>Ödeme Güncelle</strong><button onclick="this.parentElement.parentElement.style.display='none'">✕</button></div>
    <h4 id="popStudentName">İsim</h4>
    <select id="popStatus">
        <option value="Ödenmedi">Ödenmedi</option>
        <option value="Ödendi">Ödendi</option>
        <option value="Ön Ödeme">Ön Ödeme</option>
    </select>
    <button class="btn-pink" id="savePayBtn" style="margin-top:15px; width:100%;">KAYDET</button>
</div>

<div id="loginModal" onclick="if(event.target === this) this.style.display='none'">
    <div class="login-card" onclick="event.stopPropagation()">
        <img src="https://cdn-icons-png.flaticon.com/512/6195/6195699.png" style="width:60px; margin-bottom:20px;">
        <h3 style="margin:0 0 20px 0;">Yönetici Girişi</h3>
        <input type="password" id="passInput" placeholder="Şifre" style="text-align:center; font-size:20px;">
        <button class="btn-pink" onclick="checkPass()" style="margin-top:20px; font-size:16px; width:100%;">SİSTEME GİRİŞ</button>
    </div>
</div>

<div id="pStudents" class="side-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><strong>👥 Öğrenciler & Finans</strong><button onclick="cP('pStudents')">✕</button></div>
    <div style="background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:15px;">
        <input type="text" id="dbSName" placeholder="Ad Soyad">
        <input type="number" id="dbSPrice" placeholder="Ders Ücreti ₺">
        <select id="dbSPayStatus"><option value="Ödenmedi">Ödenmedi</option><option value="Ödendi">Ödendi</option><option value="Ön Ödeme">Ön Ödeme</option></select>
        <button class="btn-pink" onclick="addDBStudent()" style="margin-top:10px;">ÖĞRENCİYİ VE FİNANSI KAYDET</button>
    </div>
    <div id="studentDBList" style="overflow-y:auto; max-height:80vh;"></div>
</div>

<div id="pPerf" class="side-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><strong>💰 Maaş Hakedişleri</strong><button onclick="cP('pPerf')">✕</button></div>
    <div id="payrollArea"></div>
</div>

<div id="pAbs" class="side-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><strong>🚫 Devamsızlık Logu</strong><button onclick="cP('pAbs')">✕</button></div>
    <div id="absentLog"></div>
</div>

<div id="pTeachers" class="side-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><strong>👨‍🏫 Hoca Yönetimi</strong><button onclick="cP('pTeachers')">✕</button></div>
    <input type="text" id="nTName" placeholder="Hoca Adı"><input type="number" id="nTRate" placeholder="Ders Başı Ücret ₺">
    <button class="btn-pink" onclick="addTeacher()" style="width:100%; margin-top:10px;">EKLE</button><hr><div id="tList"></div>
</div>

<div id="pBranches" class="side-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><strong>🎨 Branşlar</strong><button onclick="cP('pBranches')">✕</button></div>
    <input type="text" id="nBName" placeholder="Branş Adı">
    <button class="btn-pink" onclick="addBranch()" style="width:100%; margin-top:10px;">EKLE</button><hr><div id="bList"></div>
</div>

<div id="tableModal">
    <button onclick="closeEverything()" style="position:fixed; top:20px; right:20px; z-index:40001; background:var(--red); color:white; border:none; border-radius:50%; width:40px; height:40px; font-weight:bold; cursor:pointer;">✕</button>
    <div style="padding:70px 10px 20px 10px; overflow-x:auto;">
        <table class="weekly-table">
            <thead><tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr></thead>
            <tbody id="weeklyBody"><tr><td><div id="day-1"></div></td><td><div id="day-2"></div></td><td><div id="day-3"></div></td><td><div id="day-4"></div></td><td><div id="day-5"></div></td><td><div id="day-6"></div></td><td><div id="day-0"></div></td></tr></tbody>
        </table>
    </div>
</div>

<div class="container">
    <div class="top-bar">
        <button onclick="document.getElementById('tableModal').style.display='block'" class="top-btn" style="background:var(--dark); color:white;">🔍 PROGRAMI GÖRÜNTÜLE</button>
        <button onclick="openMod('loginModal')" id="loginBtn" class="top-btn" style="background:var(--pink); color:white;">GİRİŞ (MOD)</button>
        <button onclick="logout()" id="exitBtn" class="top-btn" style="background:var(--red); color:white; display:none;">🚪 ÇIKIŞ</button>
    </div>

    <div class="admin-only" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;">
        <button onclick="oP('pPerf')" class="top-btn" style="background:white; color:var(--dark); border:1px solid #ddd; flex:1;">💰 Hakediş</button>
        <button onclick="oP('pAbs')" class="top-btn" style="background:white; color:var(--dark); border:1px solid #ddd; flex:1;">🚫 Devamsızlık</button>
        <button onclick="oP('pStudents')" class="top-btn" style="background:white; color:var(--dark); border:1px solid #ddd; flex:1;">👥 Öğrenciler</button>
        <button onclick="oP('pTeachers')" class="top-btn" style="background:white; color:var(--dark); border:1px solid #ddd; flex:1;">👨‍🏫 Hocalar</button>
        <button onclick="oP('pBranches')" class="top-btn" style="background:white; color:var(--dark); border:1px solid #ddd; flex:1;">🎨 Branşlar</button>
    </div>

    <div class="admin-only" id="adminArea">
        <div class="card" style="border:2px dashed var(--pink); margin-bottom:20px;">
            <strong style="color:var(--pink);">➕ Yeni Ders Planla (Kontrol Merkezi)</strong>
            <div class="admin-quad-grid" style="margin-top:10px;">
                <div class="card" style="background:#fbfbfb; position:relative;">
                    <strong>1. Öğrenci</strong>
                    <input type="text" id="sName" placeholder="İsim..." oninput="showSuggest(this)">
                    <div id="sSuggest" style="background:white; border:1px solid #ddd; display:none; position:absolute; z-index:100; width:150px;"></div>
                    <input type="text" id="sPhoto" placeholder="Foto URL (Opsiyonel)" style="margin-top:5px;">
                </div>
                <div class="card" style="background:#fbfbfb;">
                    <strong>2. Ders & Branş</strong>
                    <select id="lBranch"></select>
                    <select id="tSelect"></select>
                    <select id="lType"><option value="Normal">Normal Ders</option><option value="Telafi">Telafi Dersi</option></select>
                </div>
                <div class="card" style="background:#fbfbfb;"><strong>3. Zamanlama</strong><input type="date" id="lDate"><input type="time" id="lTime"></div>
                <div class="card" style="background:#fbfbfb; display:flex; align-items:center;"><button class="btn-pink" onclick="addLesson()">KAYDET</button></div>
            </div>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:15px; background:#eee; padding:10px; border-radius:12px;">
        <select id="vFilter" onchange="render()" style="flex:1; border:none;"></select>
        <input type="text" id="sSearch" placeholder="Listede ara..." onkeyup="render()" style="flex:2; border:none;">
    </div>

    <div id="lessonList"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let tMap = {}, sDB = [];

    function oP(id) { closeEverything(); document.getElementById(id).style.display = 'block'; document.getElementById('panelOverlay').style.display = 'block'; }
    function oM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeEverything() { document.querySelectorAll('.side-panel, .global-overlay, #panelOverlay, #payPopup').forEach(el => el.style.display = 'none'); document.getElementById('sSuggest').style.display = 'none'; }

    function checkPass() { if(document.getElementById('passInput').value === "1234") { document.getElementById('bodyTag').classList.add('is-admin'); document.getElementById('loginModal').style.display='none'; document.getElementById('exitBtn').style.display='block'; render(); } else alert("Hata!"); }
    function logout() { document.getElementById('bodyTag').classList.remove('is-admin'); document.getElementById('exitBtn').style.display='none'; render(); }

    async function addDBStudent() {
        const n = document.getElementById('dbSName').value, p = document.getElementById('dbSPrice').value, s = document.getElementById('dbSPayStatus').value;
        if(n && p) await db.collection("ogrenciler").add({ name: n, price: parseFloat(p)||0, payStatus: s });
        document.getElementById('dbSName').value = ""; document.getElementById('dbSPrice').value = "";
    }
    async function addTeacher() { const n = document.getElementById('nTName').value, r = document.getElementById('nTRate').value; if(n) await db.collection("hocalar").add({name:n, rate: parseFloat(r)||0}); }
    async function addBranch() { const n = document.getElementById('nBName').value; if(n) await db.collection("branslar").add({name:n}); }

    function showSuggest(el) {
        const val = el.value.toLowerCase(), box = document.getElementById('sSuggest');
        box.innerHTML = ""; if(!val) { box.style.display='none'; return; }
        sDB.filter(s => s.name.toLowerCase().includes(val)).forEach(s => {
            const div = document.createElement("div"); div.innerText = s.name; div.style.padding='8px;cursor:pointer;border-bottom:1px solid #eee;';
            div.onclick = (e) => { e.stopPropagation(); el.value = s.name; box.style.display='none'; }; box.appendChild(div);
        });
        box.style.display = 'block';
    }

    function openPayPopup(id, name, cur) {
        const pop = document.getElementById('payPopup'); pop.style.display = 'flex';
        document.getElementById('popStudentName').innerText = name;
        document.getElementById('popStatus').value = cur;
        document.getElementById('savePayBtn').onclick = async () => {
            await db.collection("dersler").doc(id).update({ isPaid: document.getElementById('popStatus').value });
            pop.style.display = 'none';
        };
    }

    function sync() {
        db.collection("hocalar").orderBy("name").onSnapshot(snap => {
            const s1 = document.getElementById('tSelect'), s2 = document.getElementById('vFilter'), list = document.getElementById('tList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            s1.innerHTML = ""; s2.innerHTML = '<option value="Hepsi">Tüm Hocalar</option>'; list.innerHTML = "";
            snap.forEach(doc => { 
                tMap[doc.data().name] = doc.data().rate || 0;
                s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; s2.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><span><b>${doc.data().name}</b> ${isAdmin ? `<br><small>${doc.data().rate}₺</small>` : ''}</span><span onclick="del('hocalar','${doc.id}')" style="color:red; float:right; cursor:pointer;">X</span></div>`;
            });
        });
        db.collection("branslar").orderBy("name").onSnapshot(snap => {
            const b = document.getElementById('lBranch'), list = document.getElementById('bList');
            b.innerHTML = ""; list.innerHTML = "";
            snap.forEach(doc => { b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`; list.innerHTML += `<div style="padding:5px;">${doc.data().name} <span onclick="del('branslar','${doc.id}')" style="color:red; float:right; cursor:pointer;">X</span></div>`; });
        });
        db.collection("ogrenciler").orderBy("name").onSnapshot(snap => {
            sDB = []; const list = document.getElementById('studentDBList'), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
            list.innerHTML = "";
            snap.forEach(doc => {
                sDB.push({id: doc.id, ...doc.data()});
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><span><b>${doc.data().name}</b> ${isAdmin ? `<br><small>${doc.data().price}₺ - ${doc.data().payStatus}</small>` : ''}</span><span onclick="del('ogrenciler','${doc.id}')" style="color:red; float:right; cursor:pointer;">Sil</span></div>`;
            });
        });
    }

    async function addLesson() {
        const sName = document.getElementById('sName').value, hName = document.getElementById('tSelect').value, dt = document.getElementById('lDate').value, tm = document.getElementById('lTime').value;
        const student = sDB.find(st => st.name === sName);
        if(!student || !hName) return alert("Hata: Öğrenci (listeden seçilmeli) ve Hoca zorunludur!");
        await db.collection("dersler").add({ student:sName, teacher:hName, time:`${dt}T${tm}`, branch:document.getElementById('lBranch').value, type:document.getElementById('lType').value, photo:document.getElementById('sPhoto').value, price:parseFloat(student.price)||0, isPaid:student.payStatus, status:'Bekliyor', checkIn:'', checkOut:'' });
        document.getElementById('sName').value = ""; alert("Ders Planlandı!");
    }

    function render() {
        const filter = document.getElementById('vFilter').value, search = document.getElementById('sSearch').value.toLowerCase(), isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").orderBy("time").onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            const grids = [0,1,2,3,4,5,6].map(i => document.getElementById('day-'+i));
            grids.forEach(g => g.innerHTML = "");
            let hakedis = {}, absents = "";

            snap.forEach(doc => {
                const data = doc.data(); const dt = new Date(data.time);
                const isAbs = data.status === 'Gelmedi', isDone = !!data.checkIn, isTelafi = data.type === 'Telafi';
                
                // TABLO VE KART İKONLARI GERI GELDİ
                const day = dt.getDay();
                if(grids[day]) grids[day].innerHTML += `<div class="mini-lesson ${isTelafi?'mini-telafi':''} ${isDone?'mini-active':''} ${isAbs?'mini-absent':''}">
                    ${isTelafi?'[T] ':''}${isDone?'✅ ':''}${isAbs?'🚫 ':''}<b>${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</b> ${data.student}<br><small>${data.branch}</small></div>`;

                if(isAbs) absents += `<div style="padding:5px; border-bottom:1px solid #eee; color:red;">📍 ${data.student} - ${dt.toLocaleDateString()}</div>`;
                else hakedis[data.teacher] = (hakedis[data.teacher] || 0) + 1;

                if(filter !== "Hepsi" && data.teacher !== filter) return;
                if(!data.student.toLowerCase().includes(search)) return;

                const stColor = data.isPaid === 'Ödendi' ? 'var(--green)' : (data.isPaid === 'Ön Ödeme' ? 'var(--blue)' : 'var(--red)');
                listDiv.innerHTML += `<div class="lesson-item ${isTelafi?'is-telafi-card':''}">
                    ${isAdmin ? `<div class="card-finance" style="color:${stColor}" onclick="openPayPopup('${doc.id}','${data.student}','${data.isPaid}')">${data.price}₺<br>${data.isPaid}</div>` : ''}
                    <div style="display:flex; align-items:center;">
                        <img src="${data.photo||'https://cdn-icons-png.flaticon.com/512/194/194931.png'}" style="width:40px;height:40px;border-radius:50%;margin-right:10px; border:3px solid ${stColor}">
                        <div><strong>${data.student}</strong> ${isTelafi?'<span class="telafi-badge">TELAFİ</span>':''}<br><small>${data.teacher} | ${data.branch}</small></div>
                    </div>
                    <div style="margin-top:10px; font-weight:bold;">⏰ ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')} - ${dt.toLocaleDateString('tr-TR')}</div>
                    <div style="display:flex; gap:5px; margin-top:12px;">
                        <button onclick="tTime('${doc.id}','checkIn','${data.checkIn||''}')" style="flex:2; background:var(--green); color:white; border:none; border-radius:8px; padding:10px;">${data.checkIn?data.checkIn:'GİRİŞ'}</button>
                        <button onclick="tTime('${doc.id}','checkOut','${data.checkOut||''}')" style="flex:2; background:var(--blue); color:white; border:none; border-radius:8px;">${data.checkOut?data.checkOut:'ÇIKIŞ'}</button>
                        <button onclick="db.collection('dersler').doc('${doc.id}').update({status:'${isAbs?'Bekliyor':'Gelmedi'}', checkIn:'', checkOut:''})" style="flex:1; background:#666; color:white; border:none; border-radius:8px;">${isAbs?'GELDİ':'GELMEDİ'}</button>
                        ${isAdmin ? `<button onclick="del('dersler','${doc.id}')" style="background:var(--red); color:white; border:none; border-radius:8px; padding:0 12px;">X</button>` : ''}
                    </div>
                </div>`;
            });
            document.getElementById('absentLog').innerHTML = absents;
            let perfH = ""; for(let t in hakedis) perfH += `<div>${t}: ${hakedis[t]} Ders (${hakedis[t]*(tMap[t]||0)}₺)</div>`;
            document.getElementById('payrollArea').innerHTML = perfH;
        });
    }

    async function del(c, id) { if(confirm('Emin misiniz?')) await db.collection(c).doc(id).delete(); }
    
    async function tTime(id, field, value) {
        if(confirm(field.toUpperCase() + " saati girilsin/iptal edilsin mi?")) {
            let nTime = value === "" ? new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}) : "";
            await db.collection("dersler").doc(id).update({[field]:nTime, status:'Geldi'});
        }
    }
    sync(); render();
</script>
</body>
</html>
