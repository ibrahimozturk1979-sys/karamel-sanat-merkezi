<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karamel v9.25 - Master</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --pink: #d63384; --dark: #2c3e50; --green: #10b981; --red: #ef4444; --blue: #3b82f6; --yellow: #ffeb3b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; margin: 0; padding: 10px; }
        
        /* POPUP & MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 50000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .side-panel { display: none; position: fixed; top: 0; right: 0; width: 350px; height: 100%; background: white; z-index: 30000; box-shadow: -5px 0 25px rgba(0,0,0,0.1); padding: 20px; border-left: 5px solid var(--pink); overflow-y: auto; }
        
        /* ADMIN & TEACHER UI */
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .top-bar { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .top-btn { flex: 1; min-width: 100px; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* TABLE */
        #tableModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 40000; overflow: auto; }
        .weekly-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .weekly-table th { background: var(--dark); color: white; padding: 10px; }
        .weekly-table td { border: 1px solid #ddd; padding: 5px; vertical-align: top; min-height: 80px; background: white; }
        .mini-lesson { font-size: 10px; padding: 5px; border-radius: 5px; margin-bottom: 3px; border: 1px solid #eee; }

        /* CARDS */
        #lessonList { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
        .lesson-item { background: white; padding: 15px; border-radius: 18px; border-left: 10px solid var(--pink); position: relative; }
        .telafi-label { background: var(--yellow); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .finance-tag { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 11px; text-decoration: underline; }

        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; }
        .btn-pink { background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body id="bodyTag">

<div id="payPopup" class="modal-overlay" onclick="this.style.display='none'">
    <div class="popup-box" onclick="event.stopPropagation()">
        <h4>Ödeme Durumunu Güncelle</h4>
        <select id="newPayStatus">
            <option value="Ödenmedi">Ödenmedi</option>
            <option value="Ödendi">Ödendi</option>
            <option value="Ön Ödeme">Ön Ödeme</option>
        </select>
        <button class="btn-pink" id="savePayBtn" style="margin-top:15px;">GÜNCELLE</button>
    </div>
</div>

<div id="loginModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="popup-box" onclick="event.stopPropagation()">
        <h3>Yönetici Girişi</h3>
        <input type="password" id="passInput" placeholder="Şifre" style="text-align:center;">
        <button class="btn-pink" onclick="checkPass()" style="margin-top:15px;">GİRİŞ</button>
    </div>
</div>

<div id="pStudents" class="side-panel">
    <div style="display:flex; justify-content:space-between;"><strong>Öğrenci Listesi</strong><button onclick="this.parentElement.parentElement.style.display='none'">✕</button></div>
    <div id="studentDBList" style="margin-top:15px;"></div>
</div>
<div id="pTeachers" class="side-panel"><strong>Hocalar</strong><hr><div id="tList"></div></div>

<div class="container">
    <div class="top-bar">
        <button onclick="document.getElementById('tableModal').style.display='block'" class="top-btn" style="background:var(--dark); color:white;">🔍 PROGRAMI GÖRÜNTÜLE</button>
        
        <button onclick="oP('pTeachers')" class="top-btn" style="background:var(--blue); color:white;">👨‍🏫 HIZLI HOCA SEÇ</button>
        <button onclick="oP('pStudents')" class="top-btn" style="background:var(--green); color:white;">👥 HIZLI ÖĞRENCİ SEÇ</button>
        
        <button id="exitBtn" class="top-btn admin-only" onclick="logout()" style="background:var(--red); color:white;">🚪 ÇIKIŞ</button>
        <button id="loginBtn" class="top-btn" style="background:var(--pink); color:white;" onclick="document.getElementById('loginModal').style.display='flex'">MOD</button>
    </div>

    <div class="admin-only" id="adminArea">
        <div style="background:white; padding:15px; border-radius:15px; border:2px dashed var(--pink); margin-bottom:15px;">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:10px;">
                <div>
                    <strong>1. Öğrenci</strong>
                    <input type="text" id="sName" placeholder="Tıkla ve Seç..." onclick="showSuggestAll()" oninput="showSuggest(this)">
                    <div id="sSuggest" style="background:white; border:1px solid #ddd; display:none; max-height:150px; overflow:auto; position:absolute; z-index:1000; width:200px;"></div>
                </div>
                <div>
                    <strong>2. Branş & Hoca</strong>
                    <select id="lBranch"></select>
                    <select id="tSelect"></select>
                    <select id="lType"><option value="Normal">Normal</option><option value="Telafi">Telafi</option></select>
                </div>
                <div><strong>3. Zaman</strong><input type="date" id="lDate"><input type="time" id="lTime"></div>
                <div style="display:flex; align-items:flex-end;"><button class="btn-pink" onclick="addLesson()">KAYDET</button></div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <div class="card"><strong>💰 Hakedişler</strong><div id="payrollArea" style="font-size:11px; margin-top:5px;"></div></div>
            <div class="card"><strong>🚫 Gelmeyenler</strong><div id="absentLog" style="font-size:11px; margin-top:5px; color:red;"></div></div>
        </div>
    </div>

    <div id="lessonList"></div>
</div>

<div id="tableModal">
    <button onclick="this.parentElement.style.display='none'" style="position:fixed;top:10px;right:10px;background:red;color:white;border:none;padding:10px;border-radius:50%;z-index:50000;">X</button>
    <div style="padding:50px 10px;">
        <table class="weekly-table">
            <thead><tr><th>Pzt</th><th>Sal</th><th>Çar</th><th>Per</th><th>Cum</th><th>Cmt</th><th>Paz</th></tr></thead>
            <tbody id="weeklyBody"><tr><td><div id="day-1"></div></td><td><div id="day-2"></div></td><td><div id="day-3"></div></td><td><div id="day-4"></div></td><td><div id="day-5"></div></td><td><div id="day-6"></div></td><td><div id="day-0"></div></td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCDDZldfmk_wO3EYL1YC_yDLcSrPf3fQ6w", authDomain: "karamel-sanat-merkezi.firebaseapp.com", projectId: "karamel-sanat-merkezi", storageBucket: "karamel-sanat-merkezi.firebasestorage.app", messagingSenderId: "669363030241", appId: "1:669363030241:web:6583fc1b2d1f2eb7f8cfa0" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
    let tMap = {}, sDB = [];

    function checkPass() { if(document.getElementById('passInput').value === "1234") { document.getElementById('bodyTag').classList.add('is-admin'); document.getElementById('loginModal').style.display='none'; render(); } }
    function logout() { document.getElementById('bodyTag').classList.remove('is-admin'); render(); }
    function oP(id) { document.getElementById(id).style.display = 'block'; }

    // ALFABETİK ÖĞRENCİ LİSTESİ GÖSTERİMİ
    function showSuggestAll() {
        const box = document.getElementById('sSuggest'); box.innerHTML = "";
        sDB.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
            const d = document.createElement('div'); d.innerText = s.name; d.style.padding='8px;cursor:pointer;border-bottom:1px solid #eee;';
            d.onclick = () => { document.getElementById('sName').value = s.name; box.style.display='none'; }; box.appendChild(d);
        });
        box.style.display = 'block';
    }

    // ÖDEME POPUP AÇMA
    function openPayPopup(id, current) {
        if(!document.getElementById('bodyTag').classList.contains('is-admin')) return;
        const pop = document.getElementById('payPopup'); pop.style.display = 'flex';
        document.getElementById('newPayStatus').value = current;
        document.getElementById('savePayBtn').onclick = async () => {
            await db.collection("dersler").doc(id).update({ isPaid: document.getElementById('newPayStatus').value });
            pop.style.display = 'none';
        };
    }

    function sync() {
        db.collection("hocalar").onSnapshot(snap => {
            const s1 = document.getElementById('tSelect'), list = document.getElementById('tList');
            s1.innerHTML = ""; list.innerHTML = "";
            snap.forEach(doc => { 
                tMap[doc.data().name] = doc.data().rate || 0;
                s1.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">${doc.data().name} (${doc.data().rate}₺)</div>`;
            });
        });
        db.collection("branslar").onSnapshot(snap => {
            const b = document.getElementById('lBranch'); b.innerHTML = "";
            snap.forEach(doc => b.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);
        });
        db.collection("ogrenciler").onSnapshot(snap => {
            sDB = []; const list = document.getElementById('studentDBList'); list.innerHTML = "";
            snap.forEach(doc => { 
                sDB.push(doc.data()); 
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${doc.data().name}</b><br><small>${doc.data().price}₺</small></div>`;
            });
        });
    }

    function render() {
        const isAdmin = document.getElementById('bodyTag').classList.contains('is-admin');
        db.collection("dersler").orderBy("time").onSnapshot(snap => {
            const listDiv = document.getElementById('lessonList'); listDiv.innerHTML = "";
            const grids = [0,1,2,3,4,5,6].map(i => document.getElementById('day-'+i));
            grids.forEach(g => g.innerHTML = "");
            let hakedis = {}, absents = "";

            snap.forEach(doc => {
                const data = doc.data(); const dt = new Date(data.time);
                const isAbs = data.status === 'Gelmedi', isDone = !!data.checkIn, isTelafi = data.type === 'Telafi';
                
                // TABLOYA İKONLARLA EKLE
                const cell = document.getElementById('day-'+dt.getDay());
                if(cell) cell.innerHTML += `<div class="mini-lesson">${isDone?'✅':''} ${isAbs?'🚫':''} <b>${dt.getHours()}:${dt.getMinutes()}</b> ${data.student}<br><i style="font-size:9px;">${data.teacher}</i></div>`;

                if(isAbs) absents += `<div>${data.student} (${data.teacher} - ${dt.toLocaleDateString()})</div>`;
                else if(isDone || data.status === 'Bekliyor') hakedis[data.teacher] = (hakedis[data.teacher] || 0) + 1;

                listDiv.innerHTML += `
                <div class="lesson-item">
                    ${isAdmin ? `<div class="finance-tag" onclick="openPayPopup('${doc.id}','${data.isPaid}')" style="color:${data.isPaid==='Ödendi'?'green':'red'}">${data.price}₺ - ${data.isPaid}</div>`:''}
                    <strong>${data.student}</strong> ${isTelafi?'<span class="telafi-label">TELAFİ</span>':''}<br>
                    <small>${data.teacher} | ${data.branch}</small><br>
                    <b>⏰ ${dt.getHours()}:${dt.getMinutes().toString().padStart(2,'0')}</b>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button onclick="tTime('${doc.id}','checkIn')" style="flex:1; background:var(--green); color:white; border:none; border-radius:8px; padding:10px;">GİRİŞ</button>
                        <button onclick="db.collection('dersler').doc('${doc.id}').update({status:'${isAbs?'Bekliyor':'Gelmedi'}'})" style="flex:1; background:#666; color:white; border:none; border-radius:8px;">${isAbs?'GELDİ':'GELMEDİ'}</button>
                        ${isAdmin ? `<button onclick="db.collection('dersler').doc('${doc.id}').delete()" style="background:var(--red); color:white; border:none; border-radius:8px; padding:0 10px;">SİL</button>`:''}
                    </div>
                </div>`;
            });
            document.getElementById('absentLog').innerHTML = absents || "Kayıt yok.";
            let pL = ""; for(let t in hakedis) pL += `<div>${t}: ${hakedis[t]} Ders (${hakedis[t]*(tMap[t]||0)}₺)</div>`;
            document.getElementById('payrollArea').innerHTML = pL || "Veri yok.";
        });
    }

    async function addLesson() {
        const s = document.getElementById('sName').value, h = document.getElementById('tSelect').value, d = document.getElementById('lDate').value, t = document.getElementById('lTime').value;
        const stu = sDB.find(x => x.name === s);
        if(!stu || !h || !d || !t) return alert("Eksik!");
        await db.collection("dersler").add({ student:s, teacher:h, time:`${d}T${t}`, branch:document.getElementById('lBranch').value, type:document.getElementById('lType').value, price:stu.price, isPaid:stu.payStatus, status:'Bekliyor', checkIn:'' });
        document.getElementById('sName').value = "";
    }
    async function tTime(id, f) { await db.collection("dersler").doc(id).update({ [f]: new Date().toLocaleTimeString(), status: 'Geldi' }); }

    sync(); render();
</script>
</body>
</html>
